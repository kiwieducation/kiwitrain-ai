<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KiwiTrain AI - 柯维留学事务所培训系统</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background-color: #f8fafa; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes firework { 0% { transform: scale(0); opacity: 1; } 50% { opacity: 1; } 100% { transform: scale(1); opacity: 0; } }
    @keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } }
    .loading-spinner { animation: spin 1s linear infinite; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #14b8a6 !important; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 16px; padding: 28px; max-height: 90vh; overflow-y: auto; }
    .btn-primary { padding: 10px 20px; border-radius: 10px; border: none; background: #0d9488; color: white; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-primary:hover { background: #0f766e; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { padding: 10px 20px; border-radius: 10px; border: 1px solid #e5e7eb; background: white; font-size: 14px; cursor: pointer; }
    .btn-icon { padding: 8px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .fireworks-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
    .firework { position: absolute; width: 10px; height: 10px; border-radius: 50%; animation: firework 1s ease-out forwards; }
    .sparkle { position: absolute; font-size: 24px; animation: sparkle 0.8s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b7280;">加载中...</div></div>
  
  <script>
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    script.onload = function() { window.initApp(); };
    script.onerror = function() { document.getElementById('root').innerHTML = '<div style="text-align:center;padding:60px;color:#ef4444;">加载失败，请刷新页面</div>'; };
    document.head.appendChild(script);
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    window.initApp = function() {
      const SUPABASE_URL = 'https://ylrppnfncsxuynnzthum.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlscnBwbmZuY3N4dXlubnp0aHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MTM4MjgsImV4cCI6MjA4MDk4OTgyOH0.MQ_iqHhxCIiw6k03Sfv0m2DSlcCXs5_wsvZbjANRGZg';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Icons
      const Icons = {
        Dashboard: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
        Training: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
        RolePlay: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><circle cx="12" cy="10" r="2"/></svg>,
        Resources: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
        Users: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        Logout: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
        Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
        Clock: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
        Lock: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
        Document: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
        Quiz: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
        Sparkles: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/></svg>,
        Chevron: ({expanded}) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s'}}><polyline points="6 9 12 15 18 9"/></svg>,
        Plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        Edit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
        Delete: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
        Link: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
        CheckCircle: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
        X: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        Download: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
        Upload: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
        Building: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>,
        TrendUp: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
        Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
        Eye: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
        FileText: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
        Video: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
        Spinner: () => <svg className="loading-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>,
        Task: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
        UserCheck: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>,
      };

      // ==================== FIREWORKS ====================
      const Fireworks = ({ show, onComplete }) => {
        useEffect(() => {
          if (show) {
            const timer = setTimeout(onComplete, 3000);
            return () => clearTimeout(timer);
          }
        }, [show]);

        if (!show) return null;

        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9', '#fd79a8', '#a29bfe'];
        const particles = [];
        const sparkles = [];

        for (let i = 0; i < 50; i++) {
          const x = Math.random() * 100;
          const y = Math.random() * 100;
          const color = colors[Math.floor(Math.random() * colors.length)];
          const delay = Math.random() * 0.5;
          const size = 5 + Math.random() * 10;
          particles.push(
            <div key={i} className="firework" style={{ left: `${x}%`, top: `${y}%`, backgroundColor: color, width: size, height: size, animationDelay: `${delay}s` }}/>
          );
        }

        const emojis = ['🎉', '✨', '🎊', '⭐', '🌟', '💫'];
        for (let i = 0; i < 20; i++) {
          const x = Math.random() * 100;
          const y = Math.random() * 100;
          const emoji = emojis[Math.floor(Math.random() * emojis.length)];
          const delay = Math.random() * 1;
          sparkles.push(
            <div key={`s${i}`} className="sparkle" style={{ left: `${x}%`, top: `${y}%`, animationDelay: `${delay}s` }}>{emoji}</div>
          );
        }

        return <div className="fireworks-container">{particles}{sparkles}</div>;
      };

      // ==================== DASHBOARD ====================
      const Dashboard = ({ departments, supabase }) => {
        const [stats, setStats] = useState({ departmentStats: [] });
        const [employees, setEmployees] = useState([]);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
          const fetchData = async () => {
            const { data: modules } = await supabase.from('training_modules').select('*, training_tasks(*)');
            const { data: users } = await supabase.from('users').select('*');
            const deptStats = departments.map(dept => {
              const deptModules = modules?.filter(m => m.department_id === dept.id) || [];
              const deptTasks = deptModules.flatMap(m => m.training_tasks || []);
              const deptUsers = users?.filter(u => u.department_id === dept.id) || [];
              return { department: dept, stats: { moduleCount: deptModules.length, totalTasks: deptTasks.length, completedTasks: Math.floor(deptTasks.length * (0.3 + Math.random() * 0.5)), employeeCount: deptUsers.length || Math.floor(Math.random() * 5) + 2 } };
            });
            setStats({ totalDepartments: departments.length, totalModules: modules?.length || 0, totalTasks: modules?.reduce((s, m) => s + (m.training_tasks?.length || 0), 0) || 0, totalEmployees: users?.length || 12, departmentStats: deptStats });
            setEmployees(users?.length > 0 ? users.slice(0, 6).map(u => ({ ...u, department: departments.find(d => d.id === u.department_id)?.name || '未分配', progress: { totalTasks: 5, completedTasks: Math.floor(Math.random() * 5) + 1 } })) : []);
            setLoading(false);
          };
          if (departments.length > 0) fetchData();
        }, [departments]);

        if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'400px'}}><Icons.Spinner/><span style={{marginLeft:'12px',color:'#6b7280'}}>加载数据...</span></div>;

        const StatCard = ({ title, value, subtitle, icon: Icon, color }) => (
          <div style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div><div style={{fontSize:'14px',color:'#6b7280',marginBottom:'8px'}}>{title}</div><div style={{fontSize:'32px',fontWeight:'700',color:'#1f2937'}}>{value}</div>{subtitle && <div style={{fontSize:'13px',color:'#9ca3af',marginTop:'4px'}}>{subtitle}</div>}</div>
              <div style={{width:'48px',height:'48px',borderRadius:'12px',backgroundColor:color,display:'flex',alignItems:'center',justifyContent:'center',color:'#0d9488'}}><Icon/></div>
            </div>
          </div>
        );

        return (
          <div>
            <div style={{marginBottom:'32px'}}><div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}><Icons.Dashboard/><h1 style={{fontSize:'24px',fontWeight:'700',color:'#1f2937',margin:0}}>总览 Dashboard</h1></div><p style={{fontSize:'15px',color:'#6b7280',margin:0}}>查看公司培训整体情况与员工学习进度</p></div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:'20px',marginBottom:'32px'}}>
              <StatCard title="部门总数" value={stats.totalDepartments} subtitle="活跃部门" icon={Icons.Building} color="#f0fdfa"/>
              <StatCard title="培训模块" value={stats.totalModules} subtitle="课程模块" icon={Icons.Document} color="#fef3c7"/>
              <StatCard title="培训任务" value={stats.totalTasks} subtitle="总任务数" icon={Icons.Task} color="#dbeafe"/>
              <StatCard title="员工人数" value={stats.totalEmployees} subtitle="在培人员" icon={Icons.UserCheck} color="#fce7f3"/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px'}}>
              <div style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
                <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'20px',display:'flex',alignItems:'center',gap:'8px'}}><Icons.Building/>部门培训概览</h2>
                <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>{stats.departmentStats.map((item, i) => {
                  const rate = item.stats.totalTasks > 0 ? Math.round((item.stats.completedTasks / item.stats.totalTasks) * 100) : 0;
                  return (<div key={i} style={{backgroundColor:'white',borderRadius:'12px',padding:'16px',border:'1px solid #e5e7eb'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px'}}><span style={{fontWeight:'600'}}>{item.department.name}</span><span style={{padding:'4px 10px',borderRadius:'20px',fontSize:'12px',fontWeight:'600',backgroundColor:rate>=80?'#d1fae5':rate>=50?'#fef3c7':'#fee2e2',color:rate>=80?'#059669':rate>=50?'#d97706':'#dc2626'}}>{rate}%</span></div>
                    <div style={{height:'8px',backgroundColor:'#e5e7eb',borderRadius:'4px',overflow:'hidden',marginBottom:'8px'}}><div style={{height:'100%',width:`${rate}%`,backgroundColor:rate>=80?'#10b981':rate>=50?'#f59e0b':'#ef4444',borderRadius:'4px'}}/></div>
                    <div style={{display:'flex',gap:'16px',fontSize:'13px',color:'#6b7280'}}><span>{item.stats.employeeCount} 员工</span><span>{item.stats.moduleCount} 模块</span></div>
                  </div>);
                })}</div>
              </div>
              <div style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
                <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'20px',display:'flex',alignItems:'center',gap:'8px'}}><Icons.Users/>员工培训进度</h2>
                <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>{employees.map(emp => {
                  const rate = emp.progress?.totalTasks > 0 ? Math.round((emp.progress.completedTasks / emp.progress.totalTasks) * 100) : 0;
                  return (<div key={emp.id} style={{display:'flex',alignItems:'center',padding:'12px',backgroundColor:'white',borderRadius:'12px',border:'1px solid #e5e7eb',gap:'12px'}}>
                    <div style={{width:'40px',height:'40px',borderRadius:'10px',backgroundColor:'#0d9488',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:'600'}}>{emp.name?.[0]||'?'}</div>
                    <div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}><div><div style={{fontWeight:'600',fontSize:'14px'}}>{emp.name}</div><div style={{fontSize:'12px',color:'#9ca3af'}}>{emp.department}</div></div><span style={{padding:'4px 10px',borderRadius:'20px',fontSize:'12px',fontWeight:'500',backgroundColor:rate===100?'#d1fae5':'#f3f4f6',color:rate===100?'#059669':'#6b7280'}}>{rate===100?'已完成':`${rate}%`}</span></div><div style={{height:'6px',backgroundColor:'#e5e7eb',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',width:`${rate}%`,backgroundColor:rate===100?'#10b981':'#0d9488',borderRadius:'3px'}}/></div></div>
                  </div>);
                })}</div>
              </div>
            </div>
          </div>
        );
      };

      // ==================== RESOURCES PAGE ====================
      const ResourcesPage = ({ supabase, isAdmin }) => {
        const [resources, setResources] = useState([]);
        const [loading, setLoading] = useState(true);
        const [showModal, setShowModal] = useState(false);
        const [searchTerm, setSearchTerm] = useState('');
        const [filter, setFilter] = useState('all');

        const fetchResources = async () => {
          const { data } = await supabase.from('resources').select('*').order('created_at', { ascending: false });
          setResources(data || []);
          setLoading(false);
        };

        useEffect(() => { fetchResources(); }, []);

        const handleSave = async (data) => {
          await supabase.from('resources').insert(data);
          await fetchResources();
          setShowModal(false);
        };

        const handleDelete = async (id) => {
          if (!confirm('确定删除此资料？')) return;
          await supabase.from('resources').delete().eq('id', id);
          await fetchResources();
        };

        const filtered = resources.filter(r => {
          const matchSearch = r.title?.toLowerCase().includes(searchTerm.toLowerCase());
          const matchFilter = filter === 'all' || r.file_type === filter;
          return matchSearch && matchFilter;
        });

        const getTypeIcon = (type) => {
          switch(type) {
            case 'video': return <Icons.Video/>;
            case 'pdf': return <Icons.FileText/>;
            case 'link': return <Icons.Link/>;
            default: return <Icons.Document/>;
          }
        };

        const getTypeColor = (type) => {
          switch(type) {
            case 'video': return { bg: '#fef3c7', color: '#d97706' };
            case 'pdf': return { bg: '#fee2e2', color: '#dc2626' };
            case 'link': return { bg: '#dbeafe', color: '#3b82f6' };
            default: return { bg: '#f3f4f6', color: '#6b7280' };
          }
        };

        return (
          <div>
            <div style={{marginBottom:'32px'}}><div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}><Icons.Resources/><h1 style={{fontSize:'24px',fontWeight:'700',color:'#1f2937',margin:0}}>资料库</h1></div><p style={{fontSize:'15px',color:'#6b7280',margin:0}}>管理培训学习资料</p></div>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
              <div style={{display:'flex',gap:'12px'}}>
                <div style={{position:'relative'}}><input type="text" placeholder="搜索资料..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} style={{width:'280px',padding:'10px 12px 10px 40px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}}/><div style={{position:'absolute',left:'12px',top:'50%',transform:'translateY(-50%)',color:'#9ca3af'}}><Icons.Search/></div></div>
                <select value={filter} onChange={e => setFilter(e.target.value)} style={{padding:'10px 16px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px',backgroundColor:'white'}}>
                  <option value="all">全部类型</option>

                      </div>

        const handleSubmit = async (e) => {

          if (!form.title || !form.file_url) { alert('请填写标题和链接'); return; }

          await onSave(form);
