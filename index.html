<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KiwiTrain AI - 柯维留学事务所培训系统</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background-color: #f8fafa; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .loading-spinner { animation: spin 1s linear infinite; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #14b8a6 !important; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 16px; padding: 28px; max-height: 90vh; overflow-y: auto; }
    .btn-primary { padding: 10px 20px; border-radius: 10px; border: none; background: #0d9488; color: white; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-primary:hover { background: #0f766e; }
    .btn-secondary { padding: 10px 20px; border-radius: 10px; border: 1px solid #e5e7eb; background: white; font-size: 14px; cursor: pointer; }
    .btn-icon { padding: 8px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b7280;">加载中...</div></div>
  
  <script>
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    script.onload = function() { window.initApp(); };
    script.onerror = function() { document.getElementById('root').innerHTML = '<div style="text-align:center;padding:60px;color:#ef4444;">加载失败，请刷新页面</div>'; };
    document.head.appendChild(script);
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    window.initApp = function() {
      const SUPABASE_URL = 'https://ylrppnfncsxuynnzthum.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlscnBwbmZuY3N4dXlubnp0aHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MTM4MjgsImV4cCI6MjA4MDk4OTgyOH0.MQ_iqHhxCIiw6k03Sfv0m2DSlcCXs5_wsvZbjANRGZg';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Icons
      const Icons = {
        Dashboard: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
        Training: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
        RolePlay: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><circle cx="12" cy="10" r="2"/></svg>,
        Resources: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
        Users: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        Logout: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
        Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
        Clock: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
        Lock: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
        Document: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
        Quiz: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
        Sparkles: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/></svg>,
        Chevron: ({expanded}) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s'}}><polyline points="6 9 12 15 18 9"/></svg>,
        Plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        Edit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
        Delete: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
        Link: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
        Play: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
        FileText: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
        CheckCircle: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
        X: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        Download: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
        Building: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>,
        TrendUp: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
        Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
        Mail: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
        Key: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
        Spinner: () => <svg className="loading-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>,
        Task: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
        UserCheck: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>,
      };

      // ==================== DASHBOARD ====================
      const Dashboard = ({ departments, supabase }) => {
        const [stats, setStats] = useState({ departmentStats: [] });
        const [employees, setEmployees] = useState([]);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
          const fetchData = async () => {
            const { data: modules } = await supabase.from('training_modules').select('*, training_tasks(*)');
            const { data: users } = await supabase.from('users').select('*');
            const deptStats = departments.map(dept => {
              const deptModules = modules?.filter(m => m.department_id === dept.id) || [];
              const deptTasks = deptModules.flatMap(m => m.training_tasks || []);
              const deptUsers = users?.filter(u => u.department_id === dept.id) || [];
              return { department: dept, stats: { moduleCount: deptModules.length, totalTasks: deptTasks.length, completedTasks: Math.floor(deptTasks.length * (0.3 + Math.random() * 0.5)), employeeCount: deptUsers.length || Math.floor(Math.random() * 5) + 2 } };
            });
            setStats({ totalDepartments: departments.length, totalModules: modules?.length || 0, totalTasks: modules?.reduce((s, m) => s + (m.training_tasks?.length || 0), 0) || 0, totalEmployees: users?.length || 12, departmentStats: deptStats });
            setEmployees(users?.length > 0 ? users.slice(0, 6).map(u => ({ ...u, department: departments.find(d => d.id === u.department_id)?.name || '未分配', progress: { totalTasks: 5, completedTasks: Math.floor(Math.random() * 5) + 1 } })) : []);
            setLoading(false);
          };
          if (departments.length > 0) fetchData();
        }, [departments]);

        if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'400px'}}><Icons.Spinner/><span style={{marginLeft:'12px',color:'#6b7280'}}>加载数据...</span></div>;

        const StatCard = ({ title, value, subtitle, icon: Icon, color }) => (
          <div style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div><div style={{fontSize:'14px',color:'#6b7280',marginBottom:'8px'}}>{title}</div><div style={{fontSize:'32px',fontWeight:'700',color:'#1f2937'}}>{value}</div>{subtitle && <div style={{fontSize:'13px',color:'#9ca3af',marginTop:'4px'}}>{subtitle}</div>}</div>
              <div style={{width:'48px',height:'48px',borderRadius:'12px',backgroundColor:color,display:'flex',alignItems:'center',justifyContent:'center',color:'#0d9488'}}><Icon/></div>
            </div>
          </div>
        );

        return (
          <div>
            <div style={{marginBottom:'32px'}}><div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}><Icons.Dashboard/><h1 style={{fontSize:'24px',fontWeight:'700',color:'#1f2937',margin:0}}>总览 Dashboard</h1></div><p style={{fontSize:'15px',color:'#6b7280',margin:0}}>查看公司培训整体情况与员工学习进度</p></div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:'20px',marginBottom:'32px'}}>
              <StatCard title="部门总数" value={stats.totalDepartments} subtitle="活跃部门" icon={Icons.Building} color="#f0fdfa"/>
              <StatCard title="培训模块" value={stats.totalModules} subtitle="课程模块" icon={Icons.Document} color="#fef3c7"/>
              <StatCard title="培训任务" value={stats.totalTasks} subtitle="总任务数" icon={Icons.Task} color="#dbeafe"/>
              <StatCard title="员工人数" value={stats.totalEmployees} subtitle="在培人员" icon={Icons.UserCheck} color="#fce7f3"/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px'}}>
              <div style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
                <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'20px',display:'flex',alignItems:'center',gap:'8px'}}><Icons.Building/>部门培训概览</h2>
                <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>{stats.departmentStats.map((item, i) => {
                  const rate = item.stats.totalTasks > 0 ? Math.round((item.stats.completedTasks / item.stats.totalTasks) * 100) : 0;
                  return (<div key={i} style={{backgroundColor:'white',borderRadius:'12px',padding:'16px',border:'1px solid #e5e7eb'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px'}}><span style={{fontWeight:'600'}}>{item.department.name}</span><span style={{padding:'4px 10px',borderRadius:'20px',fontSize:'12px',fontWeight:'600',backgroundColor:rate>=80?'#d1fae5':rate>=50?'#fef3c7':'#fee2e2',color:rate>=80?'#059669':rate>=50?'#d97706':'#dc2626'}}>{rate}%</span></div>
                    <div style={{height:'8px',backgroundColor:'#e5e7eb',borderRadius:'4px',overflow:'hidden',marginBottom:'8px'}}><div style={{height:'100%',width:`${rate}%`,backgroundColor:rate>=80?'#10b981':rate>=50?'#f59e0b':'#ef4444',borderRadius:'4px'}}/></div>
                    <div style={{display:'flex',gap:'16px',fontSize:'13px',color:'#6b7280'}}><span>{item.stats.employeeCount} 员工</span><span>{item.stats.moduleCount} 模块</span></div>
                  </div>);
                })}</div>
              </div>
              <div style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
                <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'20px',display:'flex',alignItems:'center',gap:'8px'}}><Icons.Users/>员工培训进度</h2>
                <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>{employees.map(emp => {
                  const rate = emp.progress?.totalTasks > 0 ? Math.round((emp.progress.completedTasks / emp.progress.totalTasks) * 100) : 0;
                  return (<div key={emp.id} style={{display:'flex',alignItems:'center',padding:'12px',backgroundColor:'white',borderRadius:'12px',border:'1px solid #e5e7eb',gap:'12px'}}>
                    <div style={{width:'40px',height:'40px',borderRadius:'10px',backgroundColor:'#0d9488',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:'600'}}>{emp.name?.[0]||'?'}</div>
                    <div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}><div><div style={{fontWeight:'600',fontSize:'14px'}}>{emp.name}</div><div style={{fontSize:'12px',color:'#9ca3af'}}>{emp.department}</div></div><span style={{padding:'4px 10px',borderRadius:'20px',fontSize:'12px',fontWeight:'500',backgroundColor:rate===100?'#d1fae5':'#f3f4f6',color:rate===100?'#059669':'#6b7280'}}>{rate===100?'已完成':`${rate}%`}</span></div><div style={{height:'6px',backgroundColor:'#e5e7eb',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',width:`${rate}%`,backgroundColor:rate===100?'#10b981':'#0d9488',borderRadius:'3px'}}/></div></div>
                  </div>);
                })}</div>
              </div>
            </div>
          </div>
        );
      };

      // ==================== MATERIALS MODAL ====================
      const MaterialsModal = ({ task, supabase, onClose, onUpdate }) => {
        const [materials, setMaterials] = useState([]);
        const [loading, setLoading] = useState(true);
        const [newMaterial, setNewMaterial] = useState({ type: 'link', title: '', url: '' });
        const [saving, setSaving] = useState(false);

        useEffect(() => { fetchMaterials(); }, []);

        const fetchMaterials = async () => {
          const { data } = await supabase.from('task_materials').select('*').eq('task_id', task.id).order('sort_order');
          setMaterials(data || []);
          setLoading(false);
        };

        const handleAdd = async () => {
          if (!newMaterial.title || !newMaterial.url) return;
          setSaving(true);
          await supabase.from('task_materials').insert({ task_id: task.id, external_title: newMaterial.title, external_url: newMaterial.url, sort_order: materials.length });
          await fetchMaterials();
          setNewMaterial({ type: 'link', title: '', url: '' });
          setSaving(false);
          onUpdate();
        };

        const handleDelete = async (id) => {
          await supabase.from('task_materials').delete().eq('id', id);
          await fetchMaterials();
          onUpdate();
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" style={{width:'560px'}} onClick={e => e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
                <h3 style={{fontSize:'20px',fontWeight:'600',margin:0}}>管理学习资料</h3>
                <button onClick={onClose} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280'}}><Icons.X/></button>
              </div>

              <div style={{marginBottom:'24px'}}>
                <div style={{fontSize:'14px',fontWeight:'500',marginBottom:'12px',color:'#374151'}}>添加资料链接</div>
                <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                  <input type="text" placeholder="资料标题（如：公司介绍视频）" value={newMaterial.title} onChange={e => setNewMaterial({...newMaterial, title: e.target.value})} style={{padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}}/>
                  <input type="url" placeholder="资料链接（https://...）" value={newMaterial.url} onChange={e => setNewMaterial({...newMaterial, url: e.target.value})} style={{padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}}/>
                  <button onClick={handleAdd} disabled={saving || !newMaterial.title || !newMaterial.url} className="btn-primary" style={{opacity:(saving || !newMaterial.title || !newMaterial.url)?0.5:1}}>{saving ? '添加中...' : '添加资料'}</button>
                </div>
              </div>

              <div>
                <div style={{fontSize:'14px',fontWeight:'500',marginBottom:'12px',color:'#374151'}}>已添加的资料 ({materials.length})</div>
                {loading ? <div style={{textAlign:'center',padding:'20px',color:'#9ca3af'}}><Icons.Spinner/></div> : materials.length === 0 ? <div style={{textAlign:'center',padding:'30px',color:'#9ca3af',backgroundColor:'#f9fafb',borderRadius:'10px'}}>暂无资料</div> : (
                  <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                    {materials.map((m, i) => (
                      <div key={m.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',backgroundColor:'#f9fafb',borderRadius:'10px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                          <div style={{width:'32px',height:'32px',borderRadius:'8px',backgroundColor:'#dbeafe',display:'flex',alignItems:'center',justifyContent:'center',color:'#3b82f6'}}><Icons.Link/></div>
                          <div><div style={{fontWeight:'500',fontSize:'14px'}}>{m.external_title}</div><a href={m.external_url} target="_blank" style={{fontSize:'12px',color:'#6b7280',textDecoration:'none'}}>{m.external_url?.substring(0, 40)}...</a></div>
                        </div>
                        <button onClick={() => handleDelete(m.id)} className="btn-icon" style={{backgroundColor:'#fef2f2',color:'#ef4444'}}><Icons.Delete/></button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      // ==================== QUIZ MODAL ====================
      const QuizModal = ({ task, supabase, onClose, onUpdate }) => {
        const [questions, setQuestions] = useState([]);
        const [loading, setLoading] = useState(true);
        const [editingQuestion, setEditingQuestion] = useState(null);
        const [showForm, setShowForm] = useState(false);

        useEffect(() => { fetchQuestions(); }, []);

        const fetchQuestions = async () => {
          const { data } = await supabase.from('quiz_questions').select('*').eq('task_id', task.id).order('sort_order');
          setQuestions(data || []);
          setLoading(false);
        };

        const handleSave = async (questionData) => {
          if (questionData.id) {
            await supabase.from('quiz_questions').update({ question_text: questionData.question_text, question_type: questionData.question_type, options: questionData.options, correct_answers: questionData.correct_answers, points: questionData.points }).eq('id', questionData.id);
          } else {
            await supabase.from('quiz_questions').insert({ task_id: task.id, question_text: questionData.question_text, question_type: questionData.question_type, options: questionData.options, correct_answers: questionData.correct_answers, points: questionData.points, sort_order: questions.length });
          }
          await fetchQuestions();
          setShowForm(false);
          setEditingQuestion(null);
          onUpdate();
        };

        const handleDelete = async (id) => {
          if (!confirm('确定删除此题目？')) return;
          await supabase.from('quiz_questions').delete().eq('id', id);
          await fetchQuestions();
          onUpdate();
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" style={{width:'640px'}} onClick={e => e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
                <h3 style={{fontSize:'20px',fontWeight:'600',margin:0}}>管理考核题目</h3>
                <button onClick={onClose} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280'}}><Icons.X/></button>
              </div>

              {!showForm ? (
                <>
                  <button onClick={() => { setShowForm(true); setEditingQuestion(null); }} className="btn-primary" style={{width:'100%',marginBottom:'20px',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}><Icons.Plus/>添加选择题</button>
                  
                  <div style={{fontSize:'14px',fontWeight:'500',marginBottom:'12px'}}>已添加的题目 ({questions.length})</div>
                  {loading ? <div style={{textAlign:'center',padding:'20px'}}><Icons.Spinner/></div> : questions.length === 0 ? <div style={{textAlign:'center',padding:'30px',color:'#9ca3af',backgroundColor:'#f9fafb',borderRadius:'10px'}}>暂无题目</div> : (
                    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                      {questions.map((q, i) => (
                        <div key={q.id} style={{padding:'16px',backgroundColor:'#f9fafb',borderRadius:'12px'}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}}>
                            <div style={{display:'flex',gap:'8px'}}><span style={{backgroundColor:'#0d9488',color:'white',padding:'2px 8px',borderRadius:'4px',fontSize:'12px',fontWeight:'600'}}>{i+1}</span><span style={{backgroundColor:'#dbeafe',color:'#3b82f6',padding:'2px 8px',borderRadius:'4px',fontSize:'12px'}}>{q.question_type === 'single' ? '单选' : '多选'}</span><span style={{backgroundColor:'#fef3c7',color:'#d97706',padding:'2px 8px',borderRadius:'4px',fontSize:'12px'}}>{q.points}分</span></div>
                            <div style={{display:'flex',gap:'8px'}}><button onClick={() => { setEditingQuestion(q); setShowForm(true); }} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280'}}><Icons.Edit/></button><button onClick={() => handleDelete(q.id)} className="btn-icon" style={{backgroundColor:'#fef2f2',color:'#ef4444'}}><Icons.Delete/></button></div>
                          </div>
                          <div style={{fontWeight:'500',marginBottom:'8px'}}>{q.question_text}</div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
                            {q.options?.map(opt => (<div key={opt.id} style={{padding:'8px 12px',borderRadius:'6px',fontSize:'13px',backgroundColor:q.correct_answers?.includes(opt.id)?'#d1fae5':'white',border:'1px solid #e5e7eb',color:q.correct_answers?.includes(opt.id)?'#059669':'#374151'}}><span style={{fontWeight:'500'}}>{opt.id}.</span> {opt.text} {q.correct_answers?.includes(opt.id) && <Icons.CheckCircle/>}</div>))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </>
              ) : (
                <QuestionForm question={editingQuestion} onSave={handleSave} onCancel={() => { setShowForm(false); setEditingQuestion(null); }}/>
              )}
            </div>
          </div>
        );
      };

      // Question Form
      const QuestionForm = ({ question, onSave, onCancel }) => {
        const [form, setForm] = useState({
          question_text: question?.question_text || '',
          question_type: question?.question_type || 'single',
          options: question?.options || [{ id: 'A', text: '' }, { id: 'B', text: '' }, { id: 'C', text: '' }, { id: 'D', text: '' }],
          correct_answers: question?.correct_answers || [],
          points: question?.points || 10
        });
        const [saving, setSaving] = useState(false);

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!form.question_text || form.correct_answers.length === 0) { alert('请填写题目并选择正确答案'); return; }
          setSaving(true);
          await onSave({ id: question?.id, ...form });
          setSaving(false);
        };

        const toggleAnswer = (optId) => {
          if (form.question_type === 'single') {
            setForm({ ...form, correct_answers: [optId] });
          } else {
            setForm({ ...form, correct_answers: form.correct_answers.includes(optId) ? form.correct_answers.filter(a => a !== optId) : [...form.correct_answers, optId] });
          }
        };

        return (
          <form onSubmit={handleSubmit}>
            <div style={{marginBottom:'16px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>题目类型</label>
              <div style={{display:'flex',gap:'12px'}}>
                {['single', 'multiple'].map(t => (<label key={t} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',borderRadius:'10px',border:form.question_type===t?'2px solid #0d9488':'1px solid #e5e7eb',backgroundColor:form.question_type===t?'#f0fdfa':'white',cursor:'pointer'}}><input type="radio" name="type" checked={form.question_type===t} onChange={() => setForm({...form, question_type: t, correct_answers: []})} style={{display:'none'}}/><span style={{color:form.question_type===t?'#0d9488':'#6b7280'}}>{t==='single'?'单选题':'多选题'}</span></label>))}
              </div>
            </div>

            <div style={{marginBottom:'16px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>题目内容 *</label>
              <textarea value={form.question_text} onChange={e => setForm({...form, question_text: e.target.value})} placeholder="请输入题目内容" style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px',minHeight:'80px',resize:'vertical'}} required/>
            </div>

            <div style={{marginBottom:'16px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>选项（点击设为正确答案）</label>
              <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                {form.options.map((opt, i) => (
                  <div key={opt.id} style={{display:'flex',gap:'8px',alignItems:'center'}}>
                    <div onClick={() => toggleAnswer(opt.id)} style={{width:'36px',height:'36px',borderRadius:'8px',backgroundColor:form.correct_answers.includes(opt.id)?'#10b981':'#f3f4f6',color:form.correct_answers.includes(opt.id)?'white':'#6b7280',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'600',cursor:'pointer',flexShrink:0}}>{opt.id}</div>
                    <input type="text" value={opt.text} onChange={e => { const newOpts = [...form.options]; newOpts[i].text = e.target.value; setForm({...form, options: newOpts}); }} placeholder={`选项 ${opt.id}`} style={{flex:1,padding:'10px 12px',borderRadius:'8px',border:'1px solid #e5e7eb',fontSize:'14px'}}/>
                  </div>
                ))}
              </div>
              <div style={{fontSize:'12px',color:'#9ca3af',marginTop:'8px'}}>{form.question_type === 'single' ? '点击字母选择唯一正确答案' : '点击字母选择所有正确答案'}</div>
            </div>

            <div style={{marginBottom:'20px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>分值</label>
              <input type="number" value={form.points} onChange={e => setForm({...form, points: parseInt(e.target.value) || 10})} min="1" max="100" style={{width:'100px',padding:'10px 12px',borderRadius:'8px',border:'1px solid #e5e7eb',fontSize:'14px'}}/>
            </div>

            <div style={{display:'flex',gap:'12px',justifyContent:'flex-end'}}>
              <button type="button" onClick={onCancel} className="btn-secondary">取消</button>
              <button type="submit" disabled={saving} className="btn-primary" style={{opacity:saving?0.7:1}}>{saving ? '保存中...' : '保存题目'}</button>
            </div>
          </form>
        );
      };

      // ==================== QUIZ TAKING (Employee) ====================
      const QuizTaking = ({ task, supabase, currentUser, onClose, onComplete }) => {
        const [questions, setQuestions] = useState([]);
        const [answers, setAnswers] = useState({});
        const [loading, setLoading] = useState(true);
        const [submitting, setSubmitting] = useState(false);
        const [result, setResult] = useState(null);

        useEffect(() => {
          const fetch = async () => {
            const { data } = await supabase.from('quiz_questions').select('*').eq('task_id', task.id).order('sort_order');
            setQuestions(data || []);
            setLoading(false);
          };
          fetch();
        }, []);

        const handleSelect = (qId, optId, isMultiple) => {
          if (isMultiple) {
            const current = answers[qId] || [];
            setAnswers({ ...answers, [qId]: current.includes(optId) ? current.filter(a => a !== optId) : [...current, optId] });
          } else {
            setAnswers({ ...answers, [qId]: [optId] });
          }
        };

        const handleSubmit = async () => {
          if (Object.keys(answers).length < questions.length) { alert('请完成所有题目'); return; }
          setSubmitting(true);

          let score = 0, totalPoints = 0;
          questions.forEach(q => {
            totalPoints += q.points;
            const userAns = (answers[q.id] || []).sort().join(',');
            const correctAns = (q.correct_answers || []).sort().join(',');
            if (userAns === correctAns) score += q.points;
          });

          const passed = score >= totalPoints * 0.6;
          await supabase.from('quiz_attempts').insert({ user_id: currentUser.id, task_id: task.id, answers, score, total_points: totalPoints, passed });
          
          setResult({ score, totalPoints, passed, percentage: Math.round((score / totalPoints) * 100) });
          setSubmitting(false);
          if (passed) onComplete();
        };

        if (loading) return <div className="modal-overlay"><div className="modal-content" style={{width:'600px',textAlign:'center',padding:'60px'}}><Icons.Spinner/><p style={{marginTop:'12px',color:'#6b7280'}}>加载题目...</p></div></div>;

        if (result) return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" style={{width:'400px',textAlign:'center'}} onClick={e => e.stopPropagation()}>
              <div style={{width:'80px',height:'80px',borderRadius:'50%',backgroundColor:result.passed?'#d1fae5':'#fee2e2',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:'32px'}}>{result.passed ? '✓' : '✗'}</div>
              <h3 style={{fontSize:'24px',fontWeight:'700',marginBottom:'8px',color:result.passed?'#059669':'#dc2626'}}>{result.passed ? '恭喜通过！' : '未通过'}</h3>
              <p style={{fontSize:'48px',fontWeight:'700',color:'#1f2937',marginBottom:'8px'}}>{result.percentage}%</p>
              <p style={{color:'#6b7280',marginBottom:'24px'}}>得分: {result.score} / {result.totalPoints}</p>
              <button onClick={onClose} className="btn-primary" style={{width:'100%'}}>{result.passed ? '完成' : '关闭'}</button>
            </div>
          </div>
        );

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" style={{width:'700px',maxHeight:'85vh'}} onClick={e => e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px',position:'sticky',top:0,backgroundColor:'white',paddingBottom:'16px',borderBottom:'1px solid #e5e7eb'}}>
                <div><h3 style={{fontSize:'20px',fontWeight:'600',margin:0}}>考核测试</h3><p style={{fontSize:'14px',color:'#6b7280',margin:'4px 0 0'}}>共 {questions.length} 题，及格线 60%</p></div>
                <button onClick={onClose} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280'}}><Icons.X/></button>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:'24px'}}>
                {questions.map((q, i) => (
                  <div key={q.id} style={{padding:'20px',backgroundColor:'#f9fafb',borderRadius:'12px'}}>
                    <div style={{display:'flex',gap:'8px',marginBottom:'12px'}}><span style={{backgroundColor:'#0d9488',color:'white',padding:'4px 10px',borderRadius:'6px',fontSize:'13px',fontWeight:'600'}}>第 {i+1} 题</span><span style={{backgroundColor:'#dbeafe',color:'#3b82f6',padding:'4px 10px',borderRadius:'6px',fontSize:'13px'}}>{q.question_type === 'single' ? '单选' : '多选'}</span><span style={{backgroundColor:'#fef3c7',color:'#d97706',padding:'4px 10px',borderRadius:'6px',fontSize:'13px'}}>{q.points}分</span></div>
                    <div style={{fontSize:'16px',fontWeight:'500',marginBottom:'16px',lineHeight:'1.6'}}>{q.question_text}</div>
                    <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                      {q.options?.map(opt => {
                        const selected = (answers[q.id] || []).includes(opt.id);
                        return (<div key={opt.id} onClick={() => handleSelect(q.id, opt.id, q.question_type === 'multiple')} style={{padding:'14px 16px',borderRadius:'10px',border:selected?'2px solid #0d9488':'1px solid #e5e7eb',backgroundColor:selected?'#f0fdfa':'white',cursor:'pointer',display:'flex',alignItems:'center',gap:'12px'}}>
                          <div style={{width:'28px',height:'28px',borderRadius:q.question_type==='single'?'50%':'6px',backgroundColor:selected?'#0d9488':'#f3f4f6',color:selected?'white':'#6b7280',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'600',fontSize:'13px'}}>{opt.id}</div>
                          <span style={{color:selected?'#0d9488':'#374151'}}>{opt.text}</span>
                        </div>);
                      })}
                    </div>
                  </div>
                ))}
              </div>

              <div style={{position:'sticky',bottom:0,backgroundColor:'white',paddingTop:'20px',borderTop:'1px solid #e5e7eb',marginTop:'24px'}}>
                <button onClick={handleSubmit} disabled={submitting} className="btn-primary" style={{width:'100%',padding:'14px',fontSize:'16px',opacity:submitting?0.7:1}}>{submitting ? '提交中...' : '提交答卷'}</button>
              </div>
            </div>
          </div>
        );
      };

      // ==================== TRAINING TASK ====================
      const TrainingTask = ({ task, isCompleted, onToggleComplete, onEdit, onDelete, isAdmin, supabase, onRefresh, currentUser }) => {
        const [loading, setLoading] = useState(false);
        const [showMaterials, setShowMaterials] = useState(false);
        const [showQuiz, setShowQuiz] = useState(false);
        const [showQuizTaking, setShowQuizTaking] = useState(false);
        const [materials, setMaterials] = useState([]);
        const [quizCount, setQuizCount] = useState(0);

        useEffect(() => {
          const fetch = async () => {
            const { data: mats } = await supabase.from('task_materials').select('*').eq('task_id', task.id);
            const { data: quizzes, count } = await supabase.from('quiz_questions').select('*', { count: 'exact' }).eq('task_id', task.id);
            setMaterials(mats || []);
            setQuizCount(count || 0);
          };
          fetch();
        }, [task.id]);

        const handleToggle = async () => { setLoading(true); await onToggleComplete(task.id); setLoading(false); };

        return (
          <>
            <div style={{backgroundColor:'#fff',borderRadius:'12px',padding:'16px 20px',marginBottom:'12px',border:'1px solid #e8e8e8'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
                <div onClick={handleToggle} style={{width:'22px',height:'22px',borderRadius:'50%',backgroundColor:isCompleted?'#10b981':'transparent',border:isCompleted?'none':'2px solid #d1d5db',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginTop:'2px',flexShrink:0}}>{loading ? <Icons.Spinner/> : isCompleted && <Icons.Check/>}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:'15px',fontWeight:'500',color:'#1f2937',marginBottom:'10px',textDecoration:isCompleted?'line-through':'none',opacity:isCompleted?0.7:1}}>{task.title}</div>
                  
                  {/* Materials Section */}
                  {materials.length > 0 && (
                    <div style={{marginBottom:'10px'}}>
                      <div style={{fontSize:'13px',color:'#6b7280',marginBottom:'6px'}}>学习资料：</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
                        {materials.map(m => (<a key={m.id} href={m.external_url} target="_blank" style={{display:'flex',alignItems:'center',gap:'6px',padding:'6px 12px',backgroundColor:'#f0f9ff',borderRadius:'6px',fontSize:'13px',color:'#0369a1',textDecoration:'none'}}><Icons.Link/>{m.external_title}</a>))}
                      </div>
                    </div>
                  )}

                  <div style={{display:'flex',gap:'12px',flexWrap:'wrap',alignItems:'center'}}>
                    {materials.length > 0 && <div style={{display:'flex',alignItems:'center',gap:'4px',color:'#6b7280',fontSize:'13px'}}><Icons.Document/><span>{materials.length} 份资料</span></div>}
                    {quizCount > 0 && (
                      <button onClick={() => setShowQuizTaking(true)} style={{display:'flex',alignItems:'center',gap:'4px',color:'#f97316',fontSize:'13px',background:'none',border:'none',cursor:'pointer',padding:0}}><Icons.Quiz/><span>{quizCount} 题考核</span><span style={{backgroundColor:'#fff7ed',padding:'2px 6px',borderRadius:'4px',marginLeft:'4px'}}>开始答题</span></button>
                    )}
                    {task.is_self_complete && <div style={{display:'flex',alignItems:'center',gap:'4px',color:'#10b981',fontSize:'13px'}}><Icons.CheckCircle/><span>自主完成</span></div>}
                  </div>
                </div>

                {isAdmin && (
                  <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                    <button onClick={() => setShowMaterials(true)} className="btn-icon" style={{backgroundColor:'#dbeafe',color:'#3b82f6'}} title="管理资料"><Icons.Document/></button>
                    <button onClick={() => setShowQuiz(true)} className="btn-icon" style={{backgroundColor:'#fef3c7',color:'#d97706'}} title="管理考核"><Icons.Quiz/></button>
                    <button onClick={() => onEdit(task)} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280'}}><Icons.Edit/></button>
                    <button onClick={() => onDelete(task.id)} className="btn-icon" style={{backgroundColor:'#fef2f2',color:'#ef4444'}}><Icons.Delete/></button>
                  </div>
                )}
              </div>
            </div>

            {showMaterials && <MaterialsModal task={task} supabase={supabase} onClose={() => setShowMaterials(false)} onUpdate={onRefresh}/>}
            {showQuiz && <QuizModal task={task} supabase={supabase} onClose={() => setShowQuiz(false)} onUpdate={onRefresh}/>}
            {showQuizTaking && <QuizTaking task={task} supabase={supabase} currentUser={currentUser} onClose={() => setShowQuizTaking(false)} onComplete={() => { setShowQuizTaking(false); onToggleComplete(task.id); }}/>}
          </>
        );
      };

      // ==================== DAY MODULE ====================
      const DayModule = ({ module, userProgress, onToggleComplete, onEditTask, onDeleteTask, onAddTask, isAdmin, supabase, onRefresh, currentUser }) => {
        const [isExpanded, setIsExpanded] = useState(true);
        return (
          <div style={{marginBottom:'24px'}}>
            <div onClick={() => setIsExpanded(!isExpanded)} style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px',cursor:'pointer'}}>
              <div style={{backgroundColor:'#0d9488',color:'white',padding:'6px 14px',borderRadius:'8px',fontSize:'14px',fontWeight:'600'}}>D{module.day_number}</div>
              <h3 style={{fontSize:'17px',fontWeight:'600',color:'#1f2937',margin:0,flex:1}}>{module.title}</h3>
              {module.is_fixed && <div style={{display:'flex',alignItems:'center',gap:'4px',backgroundColor:'#f3f4f6',padding:'4px 10px',borderRadius:'6px',fontSize:'12px',color:'#6b7280'}}><Icons.Lock/><span>固定课程</span></div>}
              <div style={{display:'flex',alignItems:'center',gap:'4px',color:'#9ca3af',fontSize:'13px'}}><Icons.Clock/><span>{module.duration}</span></div>
              <Icons.Chevron expanded={isExpanded}/>
            </div>
            {isExpanded && (
              <div style={{marginLeft:'4px'}}>
                {module.training_tasks?.map(task => <TrainingTask key={task.id} task={task} isCompleted={userProgress?.find(p => p.task_id === task.id)?.is_completed || false} onToggleComplete={onToggleComplete} onEdit={onEditTask} onDelete={onDeleteTask} isAdmin={isAdmin} supabase={supabase} onRefresh={onRefresh} currentUser={currentUser}/>)}
                {isAdmin && <button onClick={() => onAddTask(module.id)} style={{display:'flex',alignItems:'center',gap:'8px',padding:'12px 16px',borderRadius:'10px',border:'2px dashed #d1d5db',backgroundColor:'transparent',color:'#6b7280',fontSize:'14px',cursor:'pointer',width:'100%',justifyContent:'center'}}><Icons.Plus/>添加任务</button>}
              </div>
            )}
          </div>
        );
      };

      // ==================== TASK MODAL ====================
      const TaskModal = ({ task, moduleId, onSave, onClose }) => {
        const [form, setForm] = useState({ title: task?.title || '', materials_count: task?.materials_count || 0, quiz_count: task?.quiz_count || 0, is_self_complete: task?.is_self_complete || false });
        const [saving, setSaving] = useState(false);
        const handleSubmit = async (e) => { e.preventDefault(); setSaving(true); await onSave({ ...form, id: task?.id, module_id: moduleId }); setSaving(false); onClose(); };
        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" style={{width:'500px'}} onClick={e => e.stopPropagation()}>
              <h3 style={{margin:'0 0 20px',fontSize:'18px',fontWeight:'600'}}>{task ? '编辑任务' : '添加任务'}</h3>
              <form onSubmit={handleSubmit}>
                <div style={{marginBottom:'16px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>任务标题</label><textarea value={form.title} onChange={e => setForm({...form, title: e.target.value})} style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px',minHeight:'80px',resize:'vertical'}} required/></div>
                <div style={{marginBottom:'20px'}}><label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer'}}><input type="checkbox" checked={form.is_self_complete} onChange={e => setForm({...form, is_self_complete: e.target.checked})} style={{width:'16px',height:'16px'}}/><span style={{fontSize:'14px'}}>自主完成任务</span></label></div>
                <div style={{display:'flex',gap:'12px',justifyContent:'flex-end'}}><button type="button" onClick={onClose} className="btn-secondary">取消</button><button type="submit" disabled={saving} className="btn-primary" style={{opacity:saving?0.7:1}}>{saving ? '保存中...' : '保存'}</button></div>
              </form>
            </div>
          </div>
        );
      };

      // ==================== TRAINING PAGE ====================
      const TrainingPage = ({ departments, selectedDepartment, setSelectedDepartment, trainingModules, userProgress, onToggleComplete, onEditTask, onDeleteTask, onAddTask, isAdmin, supabase, onRefresh, currentUser }) => (
        <div>
          <div style={{marginBottom:'32px'}}><div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}><Icons.Sparkles/><h1 style={{fontSize:'24px',fontWeight:'700',color:'#1f2937',margin:0}}>智能培训计划生成器 {isAdmin && '(管理员)'}</h1></div><p style={{fontSize:'15px',color:'#6b7280',margin:0}}>{isAdmin ? '管理培训内容、学习资料和考核题目' : '完成以下培训任务，开始你的职业之旅'}</p></div>
          <div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:'32px'}}>
            <div><div style={{fontSize:'14px',fontWeight:'600',color:'#374151',marginBottom:'12px'}}>目标部门 / 岗位</div><div style={{display:'flex',flexDirection:'column',gap:'8px'}}>{departments.map(dept => (<div key={dept.id} onClick={() => setSelectedDepartment(dept)} style={{padding:'14px 18px',borderRadius:'10px',border:selectedDepartment?.id===dept.id?'2px solid #14b8a6':'1px solid #e5e7eb',backgroundColor:selectedDepartment?.id===dept.id?'#f0fdfa':'#ffffff',color:selectedDepartment?.id===dept.id?'#0d9488':'#374151',fontWeight:selectedDepartment?.id===dept.id?'600':'500',fontSize:'15px',cursor:'pointer'}}>{dept.name}</div>))}</div></div>
            <div><h2 style={{fontSize:'20px',fontWeight:'700',color:'#1f2937',marginBottom:'24px',paddingBottom:'16px',borderBottom:'2px solid #e5e7eb'}}>{selectedDepartment?.name || ''} - 入职培训日程</h2>{trainingModules.length === 0 ? <div style={{textAlign:'center',padding:'60px',color:'#9ca3af'}}>暂无培训内容</div> : trainingModules.map(module => <DayModule key={module.id} module={module} userProgress={userProgress} onToggleComplete={onToggleComplete} onEditTask={onEditTask} onDeleteTask={onDeleteTask} onAddTask={onAddTask} isAdmin={isAdmin} supabase={supabase} onRefresh={onRefresh} currentUser={currentUser}/>)}</div>
          </div>
        </div>
      );

      // ==================== USERS PAGE ====================
      const UsersPage = ({ departments, supabase, onDepartmentsChange }) => {
        const [activeTab, setActiveTab] = useState('employees');
        const [users, setUsers] = useState([]);
        const [searchTerm, setSearchTerm] = useState('');
        const [loading, setLoading] = useState(true);
        const [modal, setModal] = useState({ open: false, type: null, data: null });

        const fetchUsers = async () => { const { data } = await supabase.from('users').select('*').order('created_at', { ascending: false }); setUsers(data || []); setLoading(false); };
        useEffect(() => { fetchUsers(); }, []);

        const handleSaveUser = async (userData) => {
          if (userData.id) { await supabase.from('users').update({ name: userData.name, email: userData.email, department_id: userData.department_id, role: userData.role }).eq('id', userData.id); }
          else { await supabase.from('users').insert({ name: userData.name, email: userData.email, department_id: userData.department_id, role: userData.role || 'employee' }); }
          await fetchUsers();
        };

        const handleDeleteUser = async (id) => { if (!confirm('确定删除？')) return; await supabase.from('users').delete().eq('id', id); await fetchUsers(); };

        const handleSaveDept = async (data) => {
          if (data.id) { await supabase.from('departments').update({ name: data.name, description: data.description }).eq('id', data.id); }
          else { const { data: existing } = await supabase.from('departments').select('sort_order').order('sort_order', { ascending: false }).limit(1); await supabase.from('departments').insert({ name: data.name, description: data.description, sort_order: (existing?.[0]?.sort_order || 0) + 1 }); }
          onDepartmentsChange();
        };

        const handleDeleteDept = async (id) => { if (!confirm('确定删除？')) return; await supabase.from('departments').delete().eq('id', id); onDepartmentsChange(); };

        const filtered = users.filter(u => u.name?.toLowerCase().includes(searchTerm.toLowerCase()) || u.email?.toLowerCase().includes(searchTerm.toLowerCase()));

        return (
          <div>
            <div style={{marginBottom:'32px'}}><div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}><Icons.Users/><h1 style={{fontSize:'24px',fontWeight:'700',color:'#1f2937',margin:0}}>账号管理</h1></div><p style={{fontSize:'15px',color:'#6b7280',margin:0}}>管理部门和员工账号信息</p></div>
            
            <div style={{display:'flex',gap:'8px',marginBottom:'24px',borderBottom:'2px solid #e5e7eb'}}>
              {['employees', 'departments'].map(t => (<button key={t} onClick={() => setActiveTab(t)} style={{padding:'12px 24px',fontSize:'15px',fontWeight:activeTab===t?'600':'500',color:activeTab===t?'#0d9488':'#6b7280',backgroundColor:'transparent',border:'none',borderBottom:activeTab===t?'2px solid #0d9488':'2px solid transparent',marginBottom:'-2px',cursor:'pointer'}}>{t==='employees'?'员工管理':'部门管理'}</button>))}
            </div>

            {activeTab === 'employees' && (
              <div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'20px'}}>
                  <div style={{position:'relative',width:'300px'}}><input type="text" placeholder="搜索员工..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} style={{width:'100%',padding:'10px 12px 10px 40px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}}/></div>
                  <button onClick={() => setModal({ open: true, type: 'user', data: null })} className="btn-primary" style={{display:'flex',alignItems:'center',gap:'8px'}}><Icons.Plus/>添加员工</button>
                </div>
                <div style={{backgroundColor:'white',borderRadius:'16px',border:'1px solid #e5e7eb',overflow:'hidden'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead><tr style={{backgroundColor:'#f9fafb'}}><th style={{padding:'14px 20px',textAlign:'left',fontSize:'13px',fontWeight:'600',color:'#6b7280',borderBottom:'1px solid #e5e7eb'}}>员工信息</th><th style={{padding:'14px 20px',textAlign:'left',fontSize:'13px',fontWeight:'600',color:'#6b7280',borderBottom:'1px solid #e5e7eb'}}>企业邮箱</th><th style={{padding:'14px 20px',textAlign:'left',fontSize:'13px',fontWeight:'600',color:'#6b7280',borderBottom:'1px solid #e5e7eb'}}>所属部门</th><th style={{padding:'14px 20px',textAlign:'left',fontSize:'13px',fontWeight:'600',color:'#6b7280',borderBottom:'1px solid #e5e7eb'}}>角色</th><th style={{padding:'14px 20px',textAlign:'right',fontSize:'13px',fontWeight:'600',color:'#6b7280',borderBottom:'1px solid #e5e7eb'}}>操作</th></tr></thead>
                    <tbody>
                      {loading ? <tr><td colSpan="5" style={{padding:'40px',textAlign:'center'}}><Icons.Spinner/></td></tr> : filtered.length === 0 ? <tr><td colSpan="5" style={{padding:'40px',textAlign:'center',color:'#9ca3af'}}>暂无数据</td></tr> : filtered.map(u => (
                        <tr key={u.id} style={{borderBottom:'1px solid #f3f4f6'}}>
                          <td style={{padding:'16px 20px'}}><div style={{display:'flex',alignItems:'center',gap:'12px'}}><div style={{width:'40px',height:'40px',borderRadius:'10px',backgroundColor:'#0d9488',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:'600'}}>{u.name?.[0]||'?'}</div><div style={{fontWeight:'600'}}>{u.name}</div></div></td>
                          <td style={{padding:'16px 20px',color:'#6b7280',fontSize:'14px'}}>{u.email}</td>
                          <td style={{padding:'16px 20px'}}><span style={{padding:'4px 12px',borderRadius:'20px',backgroundColor:'#f0fdfa',color:'#0d9488',fontSize:'13px'}}>{departments.find(d => d.id === u.department_id)?.name || '未分配'}</span></td>
                          <td style={{padding:'16px 20px'}}><span style={{padding:'4px 12px',borderRadius:'20px',backgroundColor:u.role==='admin'?'#fef3c7':'#f3f4f6',color:u.role==='admin'?'#d97706':'#6b7280',fontSize:'13px'}}>{u.role==='admin'?'管理员':'员工'}</span></td>
                          <td style={{padding:'16px 20px',textAlign:'right'}}><button onClick={() => setModal({ open: true, type: 'user', data: u })} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280',marginRight:'8px'}}><Icons.Edit/></button><button onClick={() => handleDeleteUser(u.id)} className="btn-icon" style={{backgroundColor:'#fef2f2',color:'#ef4444'}}><Icons.Delete/></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab === 'departments' && (
              <div>
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'20px'}}><button onClick={() => setModal({ open: true, type: 'dept', data: null })} className="btn-primary" style={{display:'flex',alignItems:'center',gap:'8px'}}><Icons.Plus/>添加部门</button></div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:'16px'}}>
                  {departments.map(d => (<div key={d.id} style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:'16px'}}><div><h3 style={{fontSize:'18px',fontWeight:'600',marginBottom:'4px'}}>{d.name}</h3><p style={{fontSize:'13px',color:'#9ca3af'}}>{d.description || '暂无描述'}</p></div><div style={{display:'flex',gap:'8px'}}><button onClick={() => setModal({ open: true, type: 'dept', data: d })} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280'}}><Icons.Edit/></button><button onClick={() => handleDeleteDept(d.id)} className="btn-icon" style={{backgroundColor:'#fef2f2',color:'#ef4444'}}><Icons.Delete/></button></div></div>
                    <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'12px',backgroundColor:'#f9fafb',borderRadius:'10px'}}><Icons.Users/><span style={{fontSize:'14px',color:'#6b7280'}}>{users.filter(u => u.department_id === d.id).length} 名员工</span></div>
                  </div>))}
                </div>
              </div>
            )}

            {modal.open && modal.type === 'user' && <UserModal user={modal.data} departments={departments} onSave={handleSaveUser} onClose={() => setModal({ open: false })}/>}
            {modal.open && modal.type === 'dept' && <DeptModal dept={modal.data} onSave={handleSaveDept} onClose={() => setModal({ open: false })}/>}
          </div>
        );
      };

      const UserModal = ({ user, departments, onSave, onClose }) => {
        const [form, setForm] = useState({ name: user?.name || '', username: user?.email?.split('@')[0] || '', password: '', department_id: user?.department_id || '', role: user?.role || 'employee' });
        const [saving, setSaving] = useState(false);
        const handleSubmit = async (e) => { e.preventDefault(); if (!form.name || !form.username || !form.department_id) { alert('请填写必填项'); return; } setSaving(true); await onSave({ id: user?.id, name: form.name, email: form.username + '@mykiwiedu.com', department_id: form.department_id, role: form.role }); setSaving(false); onClose(); };
        return (
          <div className="modal-overlay" onClick={onClose}><div className="modal-content" style={{width:'480px'}} onClick={e => e.stopPropagation()}>
            <h3 style={{margin:'0 0 24px',fontSize:'20px',fontWeight:'600'}}>{user ? '编辑员工' : '添加员工'}</h3>
            <form onSubmit={handleSubmit}>
              <div style={{marginBottom:'16px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>姓名 *</label><input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}} required/></div>
              <div style={{marginBottom:'16px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>用户名 *</label><div style={{display:'flex'}}><input type="text" value={form.username} onChange={e => setForm({...form, username: e.target.value.toLowerCase().replace(/[^a-z0-9._-]/g, '')})} style={{flex:1,padding:'12px',borderRadius:'10px 0 0 10px',border:'1px solid #e5e7eb',borderRight:'none',fontSize:'14px'}}/><span style={{padding:'12px',backgroundColor:'#f3f4f6',border:'1px solid #e5e7eb',borderRadius:'0 10px 10px 0',color:'#6b7280',fontSize:'14px'}}>@mykiwiedu.com</span></div></div>
              <div style={{marginBottom:'16px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>{user ? '重置密码' : '初始密码'}</label><input type="text" value={form.password} onChange={e => setForm({...form, password: e.target.value})} placeholder={user ? '留空不修改' : '设置初始密码'} style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}}/></div>
              <div style={{marginBottom:'16px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>所属部门 *</label><select value={form.department_id} onChange={e => setForm({...form, department_id: e.target.value})} style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px',backgroundColor:'white'}} required><option value="">请选择</option>{departments.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
              <div style={{marginBottom:'24px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>角色</label><div style={{display:'flex',gap:'12px'}}>{['employee', 'admin'].map(r => (<label key={r} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',borderRadius:'10px',border:form.role===r?'2px solid #0d9488':'1px solid #e5e7eb',backgroundColor:form.role===r?'#f0fdfa':'white',cursor:'pointer'}}><input type="radio" name="role" checked={form.role===r} onChange={() => setForm({...form, role: r})} style={{display:'none'}}/><span style={{color:form.role===r?'#0d9488':'#6b7280'}}>{r==='employee'?'普通员工':'管理员'}</span></label>))}</div></div>
              <div style={{display:'flex',gap:'12px',justifyContent:'flex-end'}}><button type="button" onClick={onClose} className="btn-secondary">取消</button><button type="submit" disabled={saving} className="btn-primary" style={{opacity:saving?0.7:1}}>{saving ? '保存中...' : '保存'}</button></div>
            </form>
          </div></div>
        );
      };

      const DeptModal = ({ dept, onSave, onClose }) => {
        const [form, setForm] = useState({ name: dept?.name || '', description: dept?.description || '' });
        const [saving, setSaving] = useState(false);
        const handleSubmit = async (e) => { e.preventDefault(); if (!form.name) return; setSaving(true); await onSave({ id: dept?.id, ...form }); setSaving(false); onClose(); };
        return (
          <div className="modal-overlay" onClick={onClose}><div className="modal-content" style={{width:'420px'}} onClick={e => e.stopPropagation()}>
            <h3 style={{margin:'0 0 24px',fontSize:'20px',fontWeight:'600'}}>{dept ? '编辑部门' : '添加部门'}</h3>
            <form onSubmit={handleSubmit}>
              <div style={{marginBottom:'16px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>部门名称 *</label><input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}} required/></div>
              <div style={{marginBottom:'24px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>部门描述</label><textarea value={form.description} onChange={e => setForm({...form, description: e.target.value})} style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px',minHeight:'80px',resize:'vertical'}}/></div>
              <div style={{display:'flex',gap:'12px',justifyContent:'flex-end'}}><button type="button" onClick={onClose} className="btn-secondary">取消</button><button type="submit" disabled={saving} className="btn-primary" style={{opacity:saving?0.7:1}}>{saving ? '保存中...' : '保存'}</button></div>
            </form>
          </div></div>
        );
      };

      // ==================== MAIN APP ====================
      function App() {
        const [activeNav, setActiveNav] = useState('dashboard');
        const [departments, setDepartments] = useState([]);
        const [selectedDepartment, setSelectedDepartment] = useState(null);
        const [trainingModules, setTrainingModules] = useState([]);
        const [userProgress, setUserProgress] = useState([]);
        const [currentUser, setCurrentUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [taskModal, setTaskModal] = useState({ open: false, task: null, moduleId: null });

        const isAdmin = currentUser?.role === 'admin';

        const fetchDepartments = async () => {
          const { data, error } = await supabase.from('departments').select('*').order('sort_order');
          if (error) { setError('获取数据失败'); return; }
          if (data?.length > 0) { setDepartments(data); if (!selectedDepartment) setSelectedDepartment(data[0]); }
        };

        const fetchTrainingModules = async () => {
          if (!selectedDepartment) return;
          const { data } = await supabase.from('training_modules').select('*, training_tasks(*)').eq('department_id', selectedDepartment.id).order('sort_order');
          if (data) setTrainingModules(data.map(m => ({ ...m, training_tasks: m.training_tasks?.sort((a, b) => a.sort_order - b.sort_order) || [] })));
        };

        const handleToggleComplete = async (taskId) => {
          if (!currentUser) return;
          const existing = userProgress.find(p => p.task_id === taskId);
          const newStatus = !existing?.is_completed;
          if (existing) { await supabase.from('user_task_progress').update({ is_completed: newStatus, completed_at: newStatus ? new Date().toISOString() : null }).eq('id', existing.id); }
          else { await supabase.from('user_task_progress').insert({ user_id: currentUser.id, task_id: taskId, is_completed: true, completed_at: new Date().toISOString() }); }
          const { data } = await supabase.from('user_task_progress').select('*').eq('user_id', currentUser.id);
          if (data) setUserProgress(data);
        };

        const handleSaveTask = async (taskData) => {
          if (taskData.id) { await supabase.from('training_tasks').update({ title: taskData.title, is_self_complete: taskData.is_self_complete }).eq('id', taskData.id); }
          else { const { data: existing } = await supabase.from('training_tasks').select('sort_order').eq('module_id', taskData.module_id).order('sort_order', { ascending: false }).limit(1); await supabase.from('training_tasks').insert({ module_id: taskData.module_id, title: taskData.title, is_self_complete: taskData.is_self_complete, sort_order: (existing?.[0]?.sort_order || 0) + 1 }); }
          await fetchTrainingModules();
        };

        const handleDeleteTask = async (taskId) => { if (!confirm('确定删除？')) return; await supabase.from('training_tasks').delete().eq('id', taskId); await fetchTrainingModules(); };

        useEffect(() => { (async () => { setLoading(true); setCurrentUser({ id: 'demo-user-id', name: '管理员', role: 'admin', email: 'admin@mykiwiedu.com' }); await fetchDepartments(); setLoading(false); })(); }, []);
        useEffect(() => { if (selectedDepartment) fetchTrainingModules(); }, [selectedDepartment]);

        if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:'12px'}}><Icons.Spinner/><span style={{color:'#6b7280'}}>加载中...</span></div>;
        if (error) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:'12px'}}><div style={{color:'#ef4444'}}>❌ {error}</div><button onClick={() => window.location.reload()} className="btn-primary">重新加载</button></div>;

        const navItems = [
          { id: 'dashboard', label: '总览 Dashboard', icon: Icons.Dashboard },
          { id: 'training', label: '培训计划 Training', icon: Icons.Training },
          { id: 'roleplay', label: 'AI 陪练 Role-Play', icon: Icons.RolePlay },
          { id: 'resources', label: '资料库 Resources', icon: Icons.Resources },
          { id: 'users', label: '账号管理 Users', icon: Icons.Users },
        ];

        const renderPage = () => {
          switch (activeNav) {
            case 'dashboard': return <Dashboard departments={departments} supabase={supabase}/>;
            case 'training': return <TrainingPage departments={departments} selectedDepartment={selectedDepartment} setSelectedDepartment={setSelectedDepartment} trainingModules={trainingModules} userProgress={userProgress} onToggleComplete={handleToggleComplete} onEditTask={task => setTaskModal({ open: true, task, moduleId: task.module_id })} onDeleteTask={handleDeleteTask} onAddTask={moduleId => setTaskModal({ open: true, task: null, moduleId })} isAdmin={isAdmin} supabase={supabase} onRefresh={fetchTrainingModules} currentUser={currentUser}/>;
            case 'users': return <UsersPage departments={departments} supabase={supabase} onDepartmentsChange={fetchDepartments}/>;
            default: return <div style={{textAlign:'center',padding:'60px',color:'#9ca3af'}}><h2 style={{marginTop:'16px',color:'#1f2937'}}>功能开发中...</h2></div>;
          }
        };

        return (
          <div style={{display:'flex',minHeight:'100vh',backgroundColor:'#f8fafa'}}>
            {/* Sidebar */}
            <div style={{width:'260px',backgroundColor:'#ffffff',borderRight:'1px solid #e5e7eb',display:'flex',flexDirection:'column',position:'fixed',height:'100vh',zIndex:100}}>
              <div style={{padding:'24px 20px',borderBottom:'1px solid #f3f4f6'}}>
                <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                  <div style={{width:'44px',height:'44px',borderRadius:'12px',background:'linear-gradient(135deg, #14b8a6 0%, #0d9488 100%)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(13, 148, 136, 0.3)'}}><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
                  <div><div style={{fontSize:'18px',fontWeight:'700',color:'#0d9488'}}>KiwiTrain AI</div><div style={{fontSize:'11px',color:'#9ca3af',marginTop:'2px'}}>柯维留学事务所培训系统</div></div>
                </div>
              </div>
              <nav style={{padding:'16px 12px',flex:1}}>
                {navItems.map(item => { const Icon = item.icon; const isActive = activeNav === item.id; return (<div key={item.id} onClick={() => setActiveNav(item.id)} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 14px',borderRadius:'10px',marginBottom:'4px',cursor:'pointer',backgroundColor:isActive?'#f0fdfa':'transparent',color:isActive?'#0d9488':'#6b7280',fontWeight:isActive?'600':'500',fontSize:'14px'}}><Icon/><span>{item.label}</span></div>); })}
              </nav>
              <div style={{padding:'16px 20px',borderTop:'1px solid #f3f4f6'}}>
                <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px'}}>
                  <div style={{width:'40px',height:'40px',borderRadius:'10px',backgroundColor:'#0d9488',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:'600'}}>{currentUser?.name?.[0]||'A'}</div>
                  <div><div style={{fontSize:'14px',fontWeight:'600',color:'#1f2937'}}>{currentUser?.name||'管理员'}</div><div style={{fontSize:'12px',color:'#9ca3af'}}>{isAdmin?'管理层':'员工'}</div></div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'8px',color:'#ef4444',fontSize:'14px',cursor:'pointer',padding:'8px 0'}}><Icons.Logout/><span>退出登录</span></div>
              </div>
            </div>
            
            {/* Main */}
            <div style={{flex:1,marginLeft:'260px',padding:'32px 40px'}}>{renderPage()}</div>
            
            {taskModal.open && <TaskModal task={taskModal.task} moduleId={taskModal.moduleId} onSave={handleSaveTask} onClose={() => setTaskModal({ open: false, task: null, moduleId: null })}/>}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    };
  </script>
</body>
</html>
