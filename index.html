<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KiwiTrain AI - 柯维留学事务所培训系统</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background-color: #f8fafa; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes firework { 0% { transform: scale(0); opacity: 1; } 50% { opacity: 1; } 100% { transform: scale(1); opacity: 0; } }
    @keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } }
    .loading-spinner { animation: spin 1s linear infinite; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #14b8a6 !important; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 16px; padding: 28px; max-height: 90vh; overflow-y: auto; }
    .btn-primary { padding: 10px 20px; border-radius: 10px; border: none; background: #0d9488; color: white; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-primary:hover { background: #0f766e; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { padding: 10px 20px; border-radius: 10px; border: 1px solid #e5e7eb; background: white; font-size: 14px; cursor: pointer; }
    .btn-icon { padding: 8px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .fireworks-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
    .firework { position: absolute; width: 10px; height: 10px; border-radius: 50%; animation: firework 1s ease-out forwards; }
    .sparkle { position: absolute; font-size: 24px; animation: sparkle 0.8s ease-out forwards; }
    .file-drop { border: 2px dashed #d1d5db; border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .file-drop:hover { border-color: #0d9488; background-color: #f0fdfa; }
  </style>
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b7280;">加载中...</div></div>
  
  <script>
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    script.onload = function() { window.initApp(); };
    script.onerror = function() { document.getElementById('root').innerHTML = '<div style="text-align:center;padding:60px;color:#ef4444;">加载失败，请刷新页面</div>'; };
    document.head.appendChild(script);
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    window.initApp = function() {
      const SUPABASE_URL = 'https://ylrppnfncsxuynnzthum.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlscnBwbmZuY3N4dXlubnp0aHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MTM4MjgsImV4cCI6MjA4MDk4OTgyOH0.MQ_iqHhxCIiw6k03Sfv0m2DSlcCXs5_wsvZbjANRGZg';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Role definitions
      const ROLES = {
        admin: { label: '管理员', color: '#dc2626', bg: '#fef2f2', perms: ['all'] },
        leader: { label: '组长', color: '#d97706', bg: '#fef3c7', perms: ['edit_training', 'upload_resources'] },
        admin_staff: { label: '行政', color: '#7c3aed', bg: '#f3e8ff', perms: ['manage_users'] },
        employee: { label: '员工', color: '#6b7280', bg: '#f3f4f6', perms: [] }
      };
      const hasPerm = (user, perm) => {
        if (!user || !ROLES[user.role]) return false;
        return ROLES[user.role].perms.includes('all') || ROLES[user.role].perms.includes(perm);
      };

      // Icons
      const Icons = {
        Dashboard: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
        Training: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
        RolePlay: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><circle cx="12" cy="10" r="2"/></svg>,
        Resources: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
        Users: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        Logout: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
        Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
        Clock: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
        Lock: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
        Document: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
        Quiz: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
        Sparkles: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/></svg>,
        Chevron: ({expanded}) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s'}}><polyline points="6 9 12 15 18 9"/></svg>,
        Plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        Edit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
        Delete: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
        Link: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
        CheckCircle: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
        X: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        Download: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
        Upload: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
        Building: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/></svg>,
        TrendUp: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
        Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
        Eye: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
        FileText: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
        Video: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
        Spinner: () => <svg className="loading-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>,
        Task: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
        UserCheck: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>,
        Calendar: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      };

      // ==================== FIREWORKS ====================
      const Fireworks = ({ show, onComplete }) => {
        useEffect(() => {
          if (show) {
            const timer = setTimeout(onComplete, 3000);
            return () => clearTimeout(timer);
          }
        }, [show]);

        if (!show) return null;

        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9', '#fd79a8', '#a29bfe'];
        const particles = [];
        const sparkles = [];

        for (let i = 0; i < 50; i++) {
          const x = Math.random() * 100;
          const y = Math.random() * 100;
          const color = colors[Math.floor(Math.random() * colors.length)];
          const delay = Math.random() * 0.5;
          const size = 5 + Math.random() * 10;
          particles.push(
            <div key={i} className="firework" style={{ left: `${x}%`, top: `${y}%`, backgroundColor: color, width: size, height: size, animationDelay: `${delay}s` }}/>
          );
        }

        const emojis = ['🎉', '✨', '🎊', '⭐', '🌟', '💫'];
        for (let i = 0; i < 20; i++) {
          const x = Math.random() * 100;
          const y = Math.random() * 100;
          const emoji = emojis[Math.floor(Math.random() * emojis.length)];
          const delay = Math.random() * 1;
          sparkles.push(
            <div key={`s${i}`} className="sparkle" style={{ left: `${x}%`, top: `${y}%`, animationDelay: `${delay}s` }}>{emoji}</div>
          );
        }

        return <div className="fireworks-container">{particles}{sparkles}</div>;
      };

      // ==================== DASHBOARD ====================
      const Dashboard = ({ departments, supabase }) => {
        const [stats, setStats] = useState({ departmentStats: [] });
        const [employees, setEmployees] = useState([]);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
          const fetchData = async () => {
            const { data: modules } = await supabase.from('training_modules').select('*, training_tasks(*)');
            const { data: users } = await supabase.from('users').select('*');
            const deptStats = departments.map(dept => {
              const deptModules = modules?.filter(m => m.department_id === dept.id) || [];
              const deptTasks = deptModules.flatMap(m => m.training_tasks || []);
              const deptUsers = users?.filter(u => u.department_id === dept.id) || [];
              return { department: dept, stats: { moduleCount: deptModules.length, totalTasks: deptTasks.length, completedTasks: Math.floor(deptTasks.length * (0.3 + Math.random() * 0.5)), employeeCount: deptUsers.length || Math.floor(Math.random() * 5) + 2 } };
            });
            setStats({ totalDepartments: departments.length, totalModules: modules?.length || 0, totalTasks: modules?.reduce((s, m) => s + (m.training_tasks?.length || 0), 0) || 0, totalEmployees: users?.length || 12, departmentStats: deptStats });
            setEmployees(users?.length > 0 ? users.slice(0, 6).map(u => ({ ...u, department: departments.find(d => d.id === u.department_id)?.name || '未分配', progress: { totalTasks: 5, completedTasks: Math.floor(Math.random() * 5) + 1 } })) : []);
            setLoading(false);
          };
          if (departments.length > 0) fetchData();
        }, [departments]);

        if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'400px'}}><Icons.Spinner/><span style={{marginLeft:'12px',color:'#6b7280'}}>加载数据...</span></div>;

        const StatCard = ({ title, value, subtitle, icon: Icon, color }) => (
          <div style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div><div style={{fontSize:'14px',color:'#6b7280',marginBottom:'8px'}}>{title}</div><div style={{fontSize:'32px',fontWeight:'700',color:'#1f2937'}}>{value}</div>{subtitle && <div style={{fontSize:'13px',color:'#9ca3af',marginTop:'4px'}}>{subtitle}</div>}</div>
              <div style={{width:'48px',height:'48px',borderRadius:'12px',backgroundColor:color,display:'flex',alignItems:'center',justifyContent:'center',color:'#0d9488'}}><Icon/></div>
            </div>
          </div>
        );

        return (
          <div>
            <div style={{marginBottom:'32px'}}><div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}><Icons.Dashboard/><h1 style={{fontSize:'24px',fontWeight:'700',color:'#1f2937',margin:0}}>总览 Dashboard</h1></div><p style={{fontSize:'15px',color:'#6b7280',margin:0}}>查看公司培训整体情况与员工学习进度</p></div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:'20px',marginBottom:'32px'}}>
              <StatCard title="部门总数" value={stats.totalDepartments} subtitle="活跃部门" icon={Icons.Building} color="#f0fdfa"/>
              <StatCard title="培训模块" value={stats.totalModules} subtitle="课程模块" icon={Icons.Document} color="#fef3c7"/>
              <StatCard title="培训任务" value={stats.totalTasks} subtitle="总任务数" icon={Icons.Task} color="#dbeafe"/>
              <StatCard title="员工人数" value={stats.totalEmployees} subtitle="在培人员" icon={Icons.UserCheck} color="#fce7f3"/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px'}}>
              <div style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
                <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'20px',display:'flex',alignItems:'center',gap:'8px'}}><Icons.Building/>部门培训概览</h2>
                <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>{stats.departmentStats.map((item, i) => {
                  const rate = item.stats.totalTasks > 0 ? Math.round((item.stats.completedTasks / item.stats.totalTasks) * 100) : 0;
                  return (<div key={i} style={{backgroundColor:'white',borderRadius:'12px',padding:'16px',border:'1px solid #e5e7eb'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px'}}><span style={{fontWeight:'600'}}>{item.department.name}</span><span style={{padding:'4px 10px',borderRadius:'20px',fontSize:'12px',fontWeight:'600',backgroundColor:rate>=80?'#d1fae5':rate>=50?'#fef3c7':'#fee2e2',color:rate>=80?'#059669':rate>=50?'#d97706':'#dc2626'}}>{rate}%</span></div>
                    <div style={{height:'8px',backgroundColor:'#e5e7eb',borderRadius:'4px',overflow:'hidden',marginBottom:'8px'}}><div style={{height:'100%',width:`${rate}%`,backgroundColor:rate>=80?'#10b981':rate>=50?'#f59e0b':'#ef4444',borderRadius:'4px'}}/></div>
                    <div style={{display:'flex',gap:'16px',fontSize:'13px',color:'#6b7280'}}><span>{item.stats.employeeCount} 员工</span><span>{item.stats.moduleCount} 模块</span></div>
                  </div>);
                })}</div>
              </div>
              <div style={{backgroundColor:'white',borderRadius:'16px',padding:'24px',border:'1px solid #e5e7eb'}}>
                <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'20px',display:'flex',alignItems:'center',gap:'8px'}}><Icons.Users/>员工培训进度</h2>
                <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>{employees.map(emp => {
                  const rate = emp.progress?.totalTasks > 0 ? Math.round((emp.progress.completedTasks / emp.progress.totalTasks) * 100) : 0;
                  return (<div key={emp.id} style={{display:'flex',alignItems:'center',padding:'12px',backgroundColor:'white',borderRadius:'12px',border:'1px solid #e5e7eb',gap:'12px'}}>
                    <div style={{width:'40px',height:'40px',borderRadius:'10px',backgroundColor:'#0d9488',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:'600'}}>{emp.name?.[0]||'?'}</div>
                    <div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}><div><div style={{fontWeight:'600',fontSize:'14px'}}>{emp.name}</div><div style={{fontSize:'12px',color:'#9ca3af'}}>{emp.department}</div></div><span style={{padding:'4px 10px',borderRadius:'20px',fontSize:'12px',fontWeight:'500',backgroundColor:rate===100?'#d1fae5':'#f3f4f6',color:rate===100?'#059669':'#6b7280'}}>{rate===100?'已完成':`${rate}%`}</span></div><div style={{height:'6px',backgroundColor:'#e5e7eb',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',width:`${rate}%`,backgroundColor:rate===100?'#10b981':'#0d9488',borderRadius:'3px'}}/></div></div>
                  </div>);
                })}</div>
              </div>
            </div>
          </div>
        );
      };

      // ==================== RESOURCES PAGE ====================
      const ResourcesPage = ({ supabase, canUploadResources, isAdmin }) => {
        const [resources, setResources] = useState([]);
        const [loading, setLoading] = useState(true);
        const [showModal, setShowModal] = useState(false);
        const [searchTerm, setSearchTerm] = useState('');
        const [filter, setFilter] = useState('all');

        const fetchResources = async () => {
          const { data } = await supabase.from('resources').select('*').order('created_at', { ascending: false });
          setResources(data || []);
          setLoading(false);
        };

        useEffect(() => { fetchResources(); }, []);

        const handleSave = async (data) => {
          await supabase.from('resources').insert(data);
          await fetchResources();
          setShowModal(false);
        };

        const handleDelete = async (id) => {
          if (!confirm('确定删除此资料？')) return;
          await supabase.from('resources').delete().eq('id', id);
          await fetchResources();
        };

        const filtered = resources.filter(r => {
          const matchSearch = r.title?.toLowerCase().includes(searchTerm.toLowerCase());
          const matchFilter = filter === 'all' || r.file_type === filter;
          return matchSearch && matchFilter;
        });

        const getTypeIcon = (type) => {
          switch(type) {
            case 'video': return <Icons.Video/>;
            case 'pdf': return <Icons.FileText/>;
            case 'link': return <Icons.Link/>;
            default: return <Icons.Document/>;
          }
        };

        const getTypeColor = (type) => {
          switch(type) {
            case 'video': return { bg: '#fef3c7', color: '#d97706' };
            case 'pdf': return { bg: '#fee2e2', color: '#dc2626' };
            case 'link': return { bg: '#dbeafe', color: '#3b82f6' };
            default: return { bg: '#f3f4f6', color: '#6b7280' };
          }
        };

        return (
          <div>
            <div style={{marginBottom:'32px'}}><div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}><Icons.Resources/><h1 style={{fontSize:'24px',fontWeight:'700',color:'#1f2937',margin:0}}>资料库</h1></div><p style={{fontSize:'15px',color:'#6b7280',margin:0}}>管理培训学习资料</p></div>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
              <div style={{display:'flex',gap:'12px'}}>
                <div style={{position:'relative'}}><input type="text" placeholder="搜索资料..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} style={{width:'280px',padding:'10px 12px 10px 40px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}}/><div style={{position:'absolute',left:'12px',top:'50%',transform:'translateY(-50%)',color:'#9ca3af'}}><Icons.Search/></div></div>
                <select value={filter} onChange={e => setFilter(e.target.value)} style={{padding:'10px 16px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px',backgroundColor:'white'}}>
                  <option value="all">全部类型</option>
                  <option value="pdf">PDF文档</option>
                  <option value="video">视频</option>
                  <option value="link">链接</option>
                </select>
              </div>
              {canUploadResources && <button onClick={() => setShowModal(true)} className="btn-primary" style={{display:'flex',alignItems:'center',gap:'8px'}}><Icons.Plus/>上传资料</button>}
            </div>

            {loading ? <div style={{textAlign:'center',padding:'60px'}}><Icons.Spinner/></div> : filtered.length === 0 ? (
              <div style={{textAlign:'center',padding:'60px',backgroundColor:'white',borderRadius:'16px',border:'1px solid #e5e7eb'}}>
                <Icons.Resources/>
                <p style={{marginTop:'12px',color:'#9ca3af'}}>暂无资料</p>
              </div>
            ) : (
              <div style={{display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:'16px'}}>
                {filtered.map(r => {
                  const typeStyle = getTypeColor(r.file_type);
                  return (
                    <div key={r.id} style={{backgroundColor:'white',borderRadius:'16px',padding:'20px',border:'1px solid #e5e7eb'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}}>
                        <div style={{width:'48px',height:'48px',borderRadius:'12px',backgroundColor:typeStyle.bg,display:'flex',alignItems:'center',justifyContent:'center',color:typeStyle.color}}>{getTypeIcon(r.file_type)}</div>
                        {isAdmin && <button onClick={() => handleDelete(r.id)} className="btn-icon" style={{backgroundColor:'#fef2f2',color:'#ef4444'}}><Icons.Delete/></button>}
                      </div>
                      <h3 style={{fontSize:'16px',fontWeight:'600',color:'#1f2937',marginBottom:'8px'}}>{r.title}</h3>
                      {r.description && <p style={{fontSize:'13px',color:'#6b7280',marginBottom:'12px',lineHeight:'1.5'}}>{r.description}</p>}
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <span style={{padding:'4px 10px',borderRadius:'6px',fontSize:'12px',backgroundColor:typeStyle.bg,color:typeStyle.color}}>{r.file_type?.toUpperCase() || 'FILE'}</span>
                        {r.file_url && <a href={r.file_url} target="_blank" style={{display:'flex',alignItems:'center',gap:'4px',color:'#0d9488',fontSize:'13px',textDecoration:'none'}}><Icons.Eye/>查看</a>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {showModal && <ResourceModal supabase={supabase} onSave={handleSave} onClose={() => setShowModal(false)}/>}
          </div>
        );
      };

      const ResourceModal = ({ supabase, onSave, onClose }) => {
        const [form, setForm] = useState({ title: '', description: '', file_url: '', file_type: 'link' });
        const [saving, setSaving] = useState(false);
        const [file, setFile] = useState(null);
        const [uploadProgress, setUploadProgress] = useState('');
        const fileInputRef = React.useRef();

        const handleFileSelect = (e) => {
          const f = e.target.files?.[0];
          if (f) {
            setFile(f);
            if (!form.title) setForm({ ...form, title: f.name.split('.')[0] });
            const ext = f.name.split('.').pop().toLowerCase();
            if (['pdf', 'doc', 'docx'].includes(ext)) setForm(prev => ({ ...prev, file_type: 'pdf' }));
            else if (['mp4', 'mov', 'avi'].includes(ext)) setForm(prev => ({ ...prev, file_type: 'video' }));
            else setForm(prev => ({ ...prev, file_type: 'file' }));
          }
        };

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!form.title) { alert('请填写标题'); return; }
          if (!file && !form.file_url) { alert('请上传文件或填写链接'); return; }
          
          setSaving(true);
          let url = form.file_url;

          if (file) {
            setUploadProgress('上传中...');
            const ext = file.name.split('.').pop();
            const path = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${ext}`;
            const { data, error } = await supabase.storage.from('resources').upload(path, file);
            if (error) {
              alert('上传失败: ' + error.message);
              setSaving(false);
              setUploadProgress('');
              return;
            }
            const { data: { publicUrl } } = supabase.storage.from('resources').getPublicUrl(path);
            url = publicUrl;
          }
          
          await onSave({ title: form.title, description: form.description, file_url: url, file_type: form.file_type });
          setSaving(false);
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" style={{width:'520px'}} onClick={e => e.stopPropagation()}>
              <h3 style={{margin:'0 0 24px',fontSize:'20px',fontWeight:'600'}}>上传资料</h3>
              <form onSubmit={handleSubmit}>
                {/* File Upload Area */}
                <div style={{marginBottom:'20px'}}>
                  <div className="file-drop" onClick={() => fileInputRef.current?.click()}>
                    <input ref={fileInputRef} type="file" style={{display:'none'}} onChange={handleFileSelect} accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.mp4,.mov,.jpg,.jpeg,.png,.gif"/>
                    <Icons.Upload/>
                    <p style={{marginTop:'12px',color:'#374151',fontWeight:'500'}}>{file ? file.name : '点击上传本地文件'}</p>
                    <p style={{fontSize:'12px',color:'#9ca3af',marginTop:'4px'}}>支持 PDF、Word、PPT、Excel、视频、图片</p>
                  </div>
                </div>

                <div style={{textAlign:'center',color:'#9ca3af',margin:'16px 0'}}>— 或输入外部链接 —</div>

                <div style={{marginBottom:'16px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>资料类型</label>
                  <div style={{display:'flex',gap:'8px'}}>
                    {[{v:'link',l:'链接'},{v:'pdf',l:'文档'},{v:'video',l:'视频'}].map(t => (<button key={t.v} type="button" onClick={() => setForm({...form, file_type: t.v})} style={{flex:1,padding:'10px',borderRadius:'8px',border:form.file_type===t.v?'2px solid #0d9488':'1px solid #e5e7eb',backgroundColor:form.file_type===t.v?'#f0fdfa':'white',color:form.file_type===t.v?'#0d9488':'#6b7280',fontSize:'14px',cursor:'pointer'}}>{t.l}</button>))}
                  </div>
                </div>
                <div style={{marginBottom:'16px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>资料标题 *</label><input type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})} placeholder="如：公司介绍手册" style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}} required/></div>
                {!file && <div style={{marginBottom:'16px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>资料链接</label><input type="url" value={form.file_url} onChange={e => setForm({...form, file_url: e.target.value})} placeholder="https://..." style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}}/></div>}
                <div style={{marginBottom:'24px'}}><label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>描述说明</label><textarea value={form.description} onChange={e => setForm({...form, description: e.target.value})} placeholder="资料简介（选填）" style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px',minHeight:'80px',resize:'vertical'}}/></div>
                <div style={{display:'flex',gap:'12px',justifyContent:'flex-end'}}><button type="button" onClick={onClose} className="btn-secondary">取消</button><button type="submit" disabled={saving} className="btn-primary">{saving ? (uploadProgress || '保存中...') : '保存'}</button></div>
              </form>
            </div>
          </div>
        );
      };

      // ==================== MATERIALS MODAL ====================
      const MaterialsModal = ({ task, supabase, resources, onClose, onUpdate }) => {
        const [materials, setMaterials] = useState([]);
        const [loading, setLoading] = useState(true);
        const [newMaterial, setNewMaterial] = useState({ type: 'link', title: '', url: '', resource_id: '' });

        useEffect(() => { fetchMaterials(); }, []);

        const fetchMaterials = async () => {
          const { data } = await supabase.from('task_materials').select('*').eq('task_id', task.id).order('sort_order');
          setMaterials(data || []);
          setLoading(false);
        };

        const handleAdd = async () => {
          if (newMaterial.type === 'link' && (!newMaterial.title || !newMaterial.url)) return;
          if (newMaterial.type === 'resource' && !newMaterial.resource_id) return;

          const insertData = newMaterial.type === 'link' 
            ? { task_id: task.id, external_title: newMaterial.title, external_url: newMaterial.url, sort_order: materials.length }
            : { task_id: task.id, resource_id: newMaterial.resource_id, sort_order: materials.length };
          
          await supabase.from('task_materials').insert(insertData);
          await fetchMaterials();
          setNewMaterial({ type: 'link', title: '', url: '', resource_id: '' });
          onUpdate();
        };

        const handleDelete = async (id) => {
          await supabase.from('task_materials').delete().eq('id', id);
          await fetchMaterials();
          onUpdate();
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" style={{width:'560px'}} onClick={e => e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
                <h3 style={{fontSize:'20px',fontWeight:'600',margin:0}}>管理学习资料</h3>
                <button onClick={onClose} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280'}}><Icons.X/></button>
              </div>

              <div style={{marginBottom:'24px'}}>
                <div style={{display:'flex',gap:'8px',marginBottom:'12px'}}>
                  <button onClick={() => setNewMaterial({...newMaterial, type: 'link'})} style={{flex:1,padding:'10px',borderRadius:'8px',border:newMaterial.type==='link'?'2px solid #0d9488':'1px solid #e5e7eb',backgroundColor:newMaterial.type==='link'?'#f0fdfa':'white',color:newMaterial.type==='link'?'#0d9488':'#6b7280',fontSize:'14px',cursor:'pointer'}}>添加链接</button>
                  <button onClick={() => setNewMaterial({...newMaterial, type: 'resource'})} style={{flex:1,padding:'10px',borderRadius:'8px',border:newMaterial.type==='resource'?'2px solid #0d9488':'1px solid #e5e7eb',backgroundColor:newMaterial.type==='resource'?'#f0fdfa':'white',color:newMaterial.type==='resource'?'#0d9488':'#6b7280',fontSize:'14px',cursor:'pointer'}}>从资料库选择</button>
                </div>

                {newMaterial.type === 'link' ? (
                  <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                    <input type="text" placeholder="资料标题" value={newMaterial.title} onChange={e => setNewMaterial({...newMaterial, title: e.target.value})} style={{padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}}/>
                    <input type="url" placeholder="资料链接 https://..." value={newMaterial.url} onChange={e => setNewMaterial({...newMaterial, url: e.target.value})} style={{padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px'}}/>
                  </div>
                ) : (
                  <select value={newMaterial.resource_id} onChange={e => setNewMaterial({...newMaterial, resource_id: e.target.value})} style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px',backgroundColor:'white'}}>
                    <option value="">选择资料...</option>
                    {resources.map(r => <option key={r.id} value={r.id}>{r.title}</option>)}
                  </select>
                )}
                <button onClick={handleAdd} className="btn-primary" style={{width:'100%',marginTop:'12px'}}>添加资料</button>
              </div>

              <div>
                <div style={{fontSize:'14px',fontWeight:'500',marginBottom:'12px'}}>已添加 ({materials.length})</div>
                {loading ? <div style={{textAlign:'center',padding:'20px'}}><Icons.Spinner/></div> : materials.length === 0 ? <div style={{textAlign:'center',padding:'30px',color:'#9ca3af',backgroundColor:'#f9fafb',borderRadius:'10px'}}>暂无资料</div> : (
                  <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                    {materials.map(m => (
                      <div key={m.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',backgroundColor:'#f9fafb',borderRadius:'10px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                          <div style={{width:'32px',height:'32px',borderRadius:'8px',backgroundColor:'#dbeafe',display:'flex',alignItems:'center',justifyContent:'center',color:'#3b82f6'}}><Icons.Link/></div>
                          <div><div style={{fontWeight:'500',fontSize:'14px'}}>{m.external_title || '资料库资料'}</div>{m.external_url && <a href={m.external_url} target="_blank" style={{fontSize:'12px',color:'#6b7280'}}>{m.external_url?.substring(0, 35)}...</a>}</div>
                        </div>
                        <button onClick={() => handleDelete(m.id)} className="btn-icon" style={{backgroundColor:'#fef2f2',color:'#ef4444'}}><Icons.Delete/></button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      // ==================== QUIZ MODAL (Admin) ====================
      const QuizModal = ({ task, supabase, onClose, onUpdate }) => {
        const [questions, setQuestions] = useState([]);
        const [loading, setLoading] = useState(true);
        const [editingQuestion, setEditingQuestion] = useState(null);
        const [showForm, setShowForm] = useState(false);
        const [showBulkUpload, setShowBulkUpload] = useState(false);
        const [selectedIds, setSelectedIds] = useState([]);
        const [deleting, setDeleting] = useState(false);

        useEffect(() => { fetchQuestions(); }, []);

        const fetchQuestions = async () => {
          const { data } = await supabase.from('quiz_questions').select('*').eq('task_id', task.id).order('sort_order');
          setQuestions(data || []);
          setLoading(false);
          setSelectedIds([]);
        };

        const handleSave = async (questionData) => {
          if (questionData.id) {
            await supabase.from('quiz_questions').update({ question_text: questionData.question_text, question_type: questionData.question_type, options: questionData.options, correct_answers: questionData.correct_answers, points: questionData.points }).eq('id', questionData.id);
          } else {
            await supabase.from('quiz_questions').insert({ task_id: task.id, question_text: questionData.question_text, question_type: questionData.question_type, options: questionData.options, correct_answers: questionData.correct_answers, points: questionData.points, sort_order: questions.length });
          }
          await fetchQuestions();
          setShowForm(false);
          setEditingQuestion(null);
          onUpdate();
        };

        const handleBulkUpload = async (questionsData) => {
          for (let i = 0; i < questionsData.length; i++) {
            await supabase.from('quiz_questions').insert({ task_id: task.id, ...questionsData[i], sort_order: questions.length + i });
          }
          await fetchQuestions();
          setShowBulkUpload(false);
          onUpdate();
        };

        const handleDelete = async (id) => {
          if (!confirm('确定删除？')) return;
          await supabase.from('quiz_questions').delete().eq('id', id);
          await fetchQuestions();
          onUpdate();
        };

        // Toggle single selection
        const toggleSelect = (id) => {
          setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
        };

        // Toggle all selection
        const toggleSelectAll = () => {
          if (selectedIds.length === questions.length) {
            setSelectedIds([]);
          } else {
            setSelectedIds(questions.map(q => q.id));
          }
        };

        // Batch delete
        const handleBatchDelete = async () => {
          if (selectedIds.length === 0) return;
          if (!confirm(`确定删除选中的 ${selectedIds.length} 道题目？`)) return;
          
          setDeleting(true);
          for (const id of selectedIds) {
            await supabase.from('quiz_questions').delete().eq('id', id);
          }
          await fetchQuestions();
          onUpdate();
          setDeleting(false);
        };

        // Delete all
        const handleDeleteAll = async () => {
          if (questions.length === 0) return;
          if (!confirm(`确定删除全部 ${questions.length} 道题目？此操作不可恢复！`)) return;
          
          setDeleting(true);
          await supabase.from('quiz_questions').delete().eq('task_id', task.id);
          await fetchQuestions();
          onUpdate();
          setDeleting(false);
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" style={{width:'700px'}} onClick={e => e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
                <h3 style={{fontSize:'20px',fontWeight:'600',margin:0}}>管理考核题目</h3>
                <button onClick={onClose} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280'}}><Icons.X/></button>
              </div>

              {!showForm && !showBulkUpload ? (
                <>
                  <div style={{display:'flex',gap:'12px',marginBottom:'20px'}}>
                    <button onClick={() => setShowForm(true)} className="btn-primary" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}><Icons.Plus/>添加单题</button>
                    <button onClick={() => setShowBulkUpload(true)} className="btn-secondary" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}><Icons.Upload/>批量上传</button>
                  </div>
                  
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                    <div style={{fontSize:'14px',fontWeight:'500'}}>已添加 ({questions.length})</div>
                    {questions.length > 0 && (
                      <div style={{display:'flex',gap:'8px'}}>
                        {selectedIds.length > 0 && (
                          <button onClick={handleBatchDelete} disabled={deleting} style={{display:'flex',alignItems:'center',gap:'4px',padding:'6px 12px',borderRadius:'6px',border:'none',backgroundColor:'#fef2f2',color:'#dc2626',fontSize:'12px',fontWeight:'500',cursor:'pointer'}}>
                            {deleting ? <Icons.Spinner/> : <Icons.Delete/>}
                            删除选中 ({selectedIds.length})
                          </button>
                        )}
                        <button onClick={handleDeleteAll} disabled={deleting} style={{display:'flex',alignItems:'center',gap:'4px',padding:'6px 12px',borderRadius:'6px',border:'1px solid #e5e7eb',backgroundColor:'white',color:'#6b7280',fontSize:'12px',fontWeight:'500',cursor:'pointer'}}>
                          清空全部
                        </button>
                      </div>
                    )}
                  </div>

                  {loading ? <div style={{textAlign:'center',padding:'20px'}}><Icons.Spinner/></div> : questions.length === 0 ? <div style={{textAlign:'center',padding:'30px',color:'#9ca3af',backgroundColor:'#f9fafb',borderRadius:'10px'}}>暂无题目</div> : (
                    <>
                      {/* Select All */}
                      <div style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',backgroundColor:'#f9fafb',borderRadius:'8px',marginBottom:'12px'}}>
                        <div onClick={toggleSelectAll} style={{width:'18px',height:'18px',borderRadius:'4px',border:selectedIds.length === questions.length ? 'none' : '2px solid #d1d5db',backgroundColor:selectedIds.length === questions.length ? '#0d9488' : 'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                          {selectedIds.length === questions.length && <Icons.Check/>}
                        </div>
                        <span style={{fontSize:'13px',color:'#6b7280'}}>全选</span>
                      </div>

                      <div style={{display:'flex',flexDirection:'column',gap:'10px',maxHeight:'350px',overflowY:'auto'}}>
                        {questions.map((q, i) => (
                          <div key={q.id} style={{padding:'12px 14px',backgroundColor:selectedIds.includes(q.id)?'#f0fdfa':'#f9fafb',borderRadius:'10px',border:selectedIds.includes(q.id)?'1px solid #99f6e4':'1px solid transparent'}}>
                            <div style={{display:'flex',alignItems:'flex-start',gap:'10px'}}>
                              <div onClick={() => toggleSelect(q.id)} style={{width:'18px',height:'18px',borderRadius:'4px',border:selectedIds.includes(q.id)?'none':'2px solid #d1d5db',backgroundColor:selectedIds.includes(q.id)?'#0d9488':'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginTop:'2px',flexShrink:0}}>
                                {selectedIds.includes(q.id) && <Icons.Check/>}
                              </div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:'flex',gap:'6px',alignItems:'center',marginBottom:'6px',flexWrap:'wrap'}}>
                                  <span style={{backgroundColor:'#0d9488',color:'white',padding:'2px 6px',borderRadius:'4px',fontSize:'11px',fontWeight:'600'}}>{i+1}</span>
                                  <span style={{backgroundColor:'#dbeafe',color:'#3b82f6',padding:'2px 6px',borderRadius:'4px',fontSize:'11px'}}>{q.question_type === 'single' ? '单选' : '多选'}</span>
                                  <span style={{backgroundColor:'#fef3c7',color:'#d97706',padding:'2px 6px',borderRadius:'4px',fontSize:'11px'}}>{q.points}分</span>
                                </div>
                                <div style={{fontWeight:'500',fontSize:'13px',color:'#374151',lineHeight:'1.4'}}>{q.question_text}</div>
                              </div>
                              <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                                <button onClick={() => { setEditingQuestion(q); setShowForm(true); }} className="btn-icon" style={{backgroundColor:'white',color:'#6b7280',width:'28px',height:'28px'}}><Icons.Edit/></button>
                                <button onClick={() => handleDelete(q.id)} className="btn-icon" style={{backgroundColor:'#fef2f2',color:'#ef4444',width:'28px',height:'28px'}}><Icons.Delete/></button>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </>
                  )}
                </>
              ) : showBulkUpload ? (
                <BulkUploadForm onUpload={handleBulkUpload} onCancel={() => setShowBulkUpload(false)}/>
              ) : (
                <QuestionForm question={editingQuestion} onSave={handleSave} onCancel={() => { setShowForm(false); setEditingQuestion(null); }}/>
              )}
            </div>
          </div>
        );
      };

      // ==================== BULK UPLOAD FORM ====================
      const BulkUploadForm = ({ onUpload, onCancel }) => {
        const [text, setText] = useState('');
        const [parsed, setParsed] = useState([]);
        const [error, setError] = useState('');
        const [uploading, setUploading] = useState(false);
        const [fileName, setFileName] = useState('');
        const fileInputRef = React.useRef(null);

        const template = `1. 公司成立于哪一年？[单选]
A. 2018年
B. 2019年
C. 2020年
D. 2021年
答案: B

2. 以下哪些是公司的核心价值观？[多选]
A. 诚信
B. 创新
C. 专业
D. 服务
答案: A,B,C,D`;

        const parseQuestions = (input) => {
          setError('');
          const questions = [];
          const blocks = input.trim().split(/\n\s*\n/);

          for (const block of blocks) {
            if (!block.trim()) continue;
            const lines = block.trim().split('\n');
            
            // Parse question
            const questionMatch = lines[0].match(/^\d+\.\s*(.+?)(?:\[(.+?)\])?$/);
            if (!questionMatch) continue;
            
            const questionText = questionMatch[1].trim();
            const typeHint = questionMatch[2]?.trim().toLowerCase();
            const isMultiple = typeHint?.includes('多选');

            // Parse options
            const options = [];
            let answerLine = '';
            
            for (let i = 1; i < lines.length; i++) {
              const optMatch = lines[i].match(/^([A-D])[.、]\s*(.+)$/);
              if (optMatch) {
                options.push({ id: optMatch[1], text: optMatch[2].trim() });
              }
              if (lines[i].startsWith('答案')) {
                answerLine = lines[i];
              }
            }

            // Parse answer
            const answerMatch = answerLine.match(/答案[:：]\s*([A-D,，]+)/);
            if (!answerMatch) continue;
            
            const correctAnswers = answerMatch[1].replace(/，/g, ',').split(',').map(a => a.trim());

            if (options.length >= 2 && correctAnswers.length > 0) {
              questions.push({
                question_text: questionText,
                question_type: isMultiple || correctAnswers.length > 1 ? 'multiple' : 'single',
                options,
                correct_answers: correctAnswers,
                points: 10
              });
            }
          }

          if (questions.length === 0 && input.trim()) {
            setError('未能解析任何题目，请检查格式');
          }
          setParsed(questions);
        };

        // Parse Excel file
        const parseExcelFile = async (file) => {
          setUploading(true);
          setError('');
          setFileName(file.name);
          
          try {
            // Load SheetJS library dynamically
            if (!window.XLSX) {
              await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
              });
            }

            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            const questions = [];
            
            // Skip header row, parse data rows
            for (let i = 1; i < rows.length; i++) {
              const row = rows[i];
              if (!row || !row[0]) continue;

              // Expected columns: 题目, 类型, 选项A, 选项B, 选项C, 选项D, 答案
              const questionText = String(row[0] || '').trim();
              const typeText = String(row[1] || '单选').trim();
              const optA = String(row[2] || '').trim();
              const optB = String(row[3] || '').trim();
              const optC = String(row[4] || '').trim();
              const optD = String(row[5] || '').trim();
              const answerText = String(row[6] || '').trim().toUpperCase();

              if (!questionText || !answerText) continue;

              const options = [];
              if (optA) options.push({ id: 'A', text: optA });
              if (optB) options.push({ id: 'B', text: optB });
              if (optC) options.push({ id: 'C', text: optC });
              if (optD) options.push({ id: 'D', text: optD });

              const isMultiple = typeText.includes('多选');
              const correctAnswers = answerText.replace(/，/g, ',').split(',').map(a => a.trim()).filter(a => a);

              if (options.length >= 2 && correctAnswers.length > 0) {
                questions.push({
                  question_text: questionText,
                  question_type: isMultiple || correctAnswers.length > 1 ? 'multiple' : 'single',
                  options,
                  correct_answers: correctAnswers,
                  points: 10
                });
              }
            }

            if (questions.length === 0) {
              setError('未能从文件中解析任何题目，请检查格式');
            } else {
              setParsed(questions);
              // Also show in text area
              const textContent = questions.map((q, i) => {
                const typeLabel = q.question_type === 'multiple' ? '[多选]' : '[单选]';
                const optLines = q.options.map(o => `${o.id}. ${o.text}`).join('\n');
                return `${i+1}. ${q.question_text} ${typeLabel}\n${optLines}\n答案: ${q.correct_answers.join(',')}`;
              }).join('\n\n');
              setText(textContent);
            }
          } catch (err) {
            setError('文件解析失败：' + err.message);
          } finally {
            setUploading(false);
          }
        };

        // Handle file selection
        const handleFileSelect = (e) => {
          const file = e.target.files?.[0];
          if (file) {
            if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
              parseExcelFile(file);
            } else if (file.name.endsWith('.txt')) {
              const reader = new FileReader();
              reader.onload = (e) => {
                const content = e.target.result;
                setText(content);
                parseQuestions(content);
                setFileName(file.name);
              };
              reader.readAsText(file);
            } else {
              setError('请上传 Excel (.xlsx) 或文本 (.txt) 文件');
            }
          }
        };

        // Handle drag and drop
        const handleDrop = (e) => {
          e.preventDefault();
          e.stopPropagation();
          const file = e.dataTransfer.files?.[0];
          if (file) {
            if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls') || file.name.endsWith('.txt')) {
              if (file.name.endsWith('.txt')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                  const content = ev.target.result;
                  setText(content);
                  parseQuestions(content);
                  setFileName(file.name);
                };
                reader.readAsText(file);
              } else {
                parseExcelFile(file);
              }
            } else {
              setError('请上传 Excel (.xlsx) 或文本 (.txt) 文件');
            }
          }
        };

        const handleDragOver = (e) => {
          e.preventDefault();
          e.stopPropagation();
        };

        const handleDownloadTemplate = () => {
          // Download Excel template
          window.open('/考核题目模版.xlsx', '_blank');
        };

        const handleDownloadTxtTemplate = () => {
          const blob = new Blob([template], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = '考核题目模版.txt';
          a.click();
        };

        return (
          <div>
            <div style={{marginBottom:'16px',padding:'16px',backgroundColor:'#f0fdfa',borderRadius:'10px',border:'1px solid #99f6e4'}}>
              <div style={{fontWeight:'600',color:'#0d9488',marginBottom:'8px'}}>📝 批量上传格式说明</div>
              <div style={{fontSize:'13px',color:'#6b7280',lineHeight:'1.8'}}>
                <div>• 每题以数字编号开头，如 "1. 题目内容"</div>
                <div>• 可在题目后标注[单选]或[多选]</div>
                <div>• 选项以A.B.C.D.开头</div>
                <div>• 答案行格式：答案: A 或 答案: A,B,C</div>
                <div>• 题目之间用空行分隔</div>
              </div>
              <div style={{marginTop:'12px',display:'flex',gap:'16px'}}>
                <button onClick={handleDownloadTxtTemplate} style={{display:'flex',alignItems:'center',gap:'6px',color:'#0d9488',background:'none',border:'none',cursor:'pointer',fontSize:'13px',fontWeight:'500'}}><Icons.Download/>下载文本模版</button>
              </div>
            </div>

            {/* File Upload Zone */}
            <div style={{marginBottom:'16px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>上传文件</label>
              <div 
                onClick={() => fileInputRef.current?.click()}
                onDrop={handleDrop}
                onDragOver={handleDragOver}
                style={{
                  border: '2px dashed #d1d5db',
                  borderRadius: '10px',
                  padding: '24px',
                  textAlign: 'center',
                  cursor: 'pointer',
                  backgroundColor: '#fafafa',
                  transition: 'all 0.2s'
                }}
              >
                <input 
                  ref={fileInputRef}
                  type="file" 
                  accept=".xlsx,.xls,.txt"
                  onChange={handleFileSelect}
                  style={{display:'none'}}
                />
                {uploading ? (
                  <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',color:'#6b7280'}}>
                    <Icons.Spinner/> 解析文件中...
                  </div>
                ) : fileName ? (
                  <div>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',color:'#059669',marginBottom:'4px'}}>
                      <Icons.CheckCircle/> 已选择: {fileName}
                    </div>
                    <div style={{fontSize:'12px',color:'#9ca3af'}}>点击重新选择文件</div>
                  </div>
                ) : (
                  <div>
                    <div style={{width:'48px',height:'48px',borderRadius:'50%',backgroundColor:'#e0f2fe',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
                      <Icons.Upload/>
                    </div>
                    <div style={{color:'#374151',fontWeight:'500',marginBottom:'4px'}}>点击上传或拖拽文件到此处</div>
                    <div style={{fontSize:'13px',color:'#9ca3af'}}>支持 Excel (.xlsx) 或文本 (.txt) 文件</div>
                  </div>
                )}
              </div>
            </div>

            <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px'}}>
              <div style={{flex:1,height:'1px',backgroundColor:'#e5e7eb'}}/>
              <span style={{fontSize:'13px',color:'#9ca3af'}}>或手动粘贴</span>
              <div style={{flex:1,height:'1px',backgroundColor:'#e5e7eb'}}/>
            </div>

            <div style={{marginBottom:'16px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>粘贴题目内容</label>
              <textarea value={text} onChange={e => { setText(e.target.value); parseQuestions(e.target.value); }} placeholder={template} style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'13px',minHeight:'180px',fontFamily:'monospace',resize:'vertical'}}/>
            </div>

            {error && <div style={{padding:'12px',backgroundColor:'#fef2f2',color:'#dc2626',borderRadius:'8px',marginBottom:'16px',fontSize:'13px'}}>{error}</div>}

            {parsed.length > 0 && (
              <div style={{marginBottom:'16px',padding:'12px',backgroundColor:'#f9fafb',borderRadius:'10px'}}>
                <div style={{fontWeight:'500',marginBottom:'8px'}}>✅ 已解析 {parsed.length} 道题目：</div>
                <div style={{fontSize:'13px',color:'#6b7280',maxHeight:'150px',overflowY:'auto'}}>
                  {parsed.map((q, i) => (<div key={i} style={{padding:'4px 0'}}>{i+1}. {q.question_text.substring(0, 40)}... [{q.question_type === 'single' ? '单选' : '多选'}]</div>))}
                </div>
              </div>
            )}

            <div style={{display:'flex',gap:'12px',justifyContent:'flex-end'}}>
              <button onClick={onCancel} className="btn-secondary">取消</button>
              <button onClick={() => onUpload(parsed)} disabled={parsed.length === 0} className="btn-primary">{parsed.length > 0 ? `上传 ${parsed.length} 道题目` : '上传'}</button>
            </div>
          </div>
        );
      };

      // Question Form
      const QuestionForm = ({ question, onSave, onCancel }) => {
        const [form, setForm] = useState({
          question_text: question?.question_text || '',
          question_type: question?.question_type || 'single',
          options: question?.options || [{ id: 'A', text: '' }, { id: 'B', text: '' }, { id: 'C', text: '' }, { id: 'D', text: '' }],
          correct_answers: question?.correct_answers || [],
          points: question?.points || 10
        });

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!form.question_text || form.correct_answers.length === 0) { alert('请填写题目并选择正确答案'); return; }
          await onSave({ id: question?.id, ...form });
        };

        const toggleAnswer = (optId) => {
          if (form.question_type === 'single') {
            setForm({ ...form, correct_answers: [optId] });
          } else {
            setForm({ ...form, correct_answers: form.correct_answers.includes(optId) ? form.correct_answers.filter(a => a !== optId) : [...form.correct_answers, optId] });
          }
        };

        return (
          <form onSubmit={handleSubmit}>
            <div style={{marginBottom:'16px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>题目类型</label>
              <div style={{display:'flex',gap:'12px'}}>
                {['single', 'multiple'].map(t => (<label key={t} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',borderRadius:'10px',border:form.question_type===t?'2px solid #0d9488':'1px solid #e5e7eb',backgroundColor:form.question_type===t?'#f0fdfa':'white',cursor:'pointer'}}><input type="radio" name="type" checked={form.question_type===t} onChange={() => setForm({...form, question_type: t, correct_answers: []})} style={{display:'none'}}/><span style={{color:form.question_type===t?'#0d9488':'#6b7280'}}>{t==='single'?'单选题':'多选题'}</span></label>))}
              </div>
            </div>

            <div style={{marginBottom:'16px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>题目内容 *</label>
              <textarea value={form.question_text} onChange={e => setForm({...form, question_text: e.target.value})} placeholder="请输入题目" style={{width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid #e5e7eb',fontSize:'14px',minHeight:'80px',resize:'vertical'}} required/>
            </div>

            <div style={{marginBottom:'16px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>选项（点击设为正确答案）</label>
              <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                {form.options.map((opt, i) => (
                  <div key={opt.id} style={{display:'flex',gap:'8px',alignItems:'center'}}>
                    <div onClick={() => toggleAnswer(opt.id)} style={{width:'36px',height:'36px',borderRadius:'8px',backgroundColor:form.correct_answers.includes(opt.id)?'#10b981':'#f3f4f6',color:form.correct_answers.includes(opt.id)?'white':'#6b7280',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'600',cursor:'pointer',flexShrink:0}}>{opt.id}</div>
                    <input type="text" value={opt.text} onChange={e => { const newOpts = [...form.options]; newOpts[i].text = e.target.value; setForm({...form, options: newOpts}); }} placeholder={`选项 ${opt.id}`} style={{flex:1,padding:'10px 12px',borderRadius:'8px',border:'1px solid #e5e7eb',fontSize:'14px'}}/>
                  </div>
                ))}
              </div>
            </div>

            <div style={{marginBottom:'20px'}}>
              <label style={{display:'block',marginBottom:'6px',fontSize:'14px',fontWeight:'500'}}>分值</label>
              <input type="number" value={form.points} onChange={e => setForm({...form, points: parseInt(e.target.value) || 10})} min="1" max="100" style={{width:'100px',padding:'10px',borderRadius:'8px',border:'1px solid #e5e7eb',fontSize:'14px'}}/>
            </div>

            <div style={{display:'flex',gap:'12px',justifyContent:'flex-end'}}>
              <button type="button" onClick={onCancel} className="btn-secondary">取消</button>
              <button type="submit" className="btn-primary">保存</button>
            </div>
          </form>
        );
      };

      // ==================== QUIZ TAKING (Employee) ====================
      const QuizTaking = ({ task, supabase, currentUser, onClose, onComplete, isReview }) => {
        const [questions, setQuestions] = useState([]);
        const [answers, setAnswers] = useState({});
        const [loading, setLoading] = useState(true);
        const [submitting, setSubmitting] = useState(false);
        const [result, setResult] = useState(null);
        const [showFireworks, setShowFireworks] = useState(false);
        const [questionResults, setQuestionResults] = useState({});

        useEffect(() => {
          const fetch = async () => {
            const { data } = await supabase.from('quiz_questions').select('*').eq('task_id', task.id).order('sort_order');
            setQuestions(data || []);
            setLoading(false);
          };
          fetch();
        }, []);

        const handleSelect = (qId, optId, isMultiple) => {
          if (isReview || result) return;
          if (isMultiple) {
            const current = answers[qId] || [];
            setAnswers({ ...answers, [qId]: current.includes(optId) ? current.filter(a => a !== optId) : [...current, optId] });
          } else {
            setAnswers({ ...answers, [qId]: [optId] });
          }
        };

        const handleSubmit = async () => {
          if (Object.keys(answers).length < questions.length) { alert('请完成所有题目'); return; }
          setSubmitting(true);

          let score = 0, totalPoints = 0;
          const qResults = {};
          
          questions.forEach(q => {
            totalPoints += q.points;
            const userAns = (answers[q.id] || []).sort().join(',');
            const correctAns = (q.correct_answers || []).sort().join(',');
            const isCorrect = userAns === correctAns;
            if (isCorrect) score += q.points;
            qResults[q.id] = { isCorrect, userAnswers: answers[q.id] || [], correctAnswers: q.correct_answers || [] };
          });

          const passed = score === totalPoints; // Must be 100%
          await supabase.from('quiz_attempts').insert({ user_id: currentUser.id, task_id: task.id, answers, score, total_points: totalPoints, passed });
          
          setQuestionResults(qResults);
          setResult({ score, totalPoints, passed, percentage: Math.round((score / totalPoints) * 100) });
          if (passed) {
            setShowFireworks(true);
            onComplete();
          }
          setSubmitting(false);
        };

        const handleRetry = () => {
          setResult(null);
          setAnswers({});
          setQuestionResults({});
        };

        if (loading) return <div className="modal-overlay"><div className="modal-content" style={{width:'600px',textAlign:'center',padding:'60px'}}><Icons.Spinner/><p style={{marginTop:'12px',color:'#6b7280'}}>加载题目...</p></div></div>;

        return (
          <>
            <Fireworks show={showFireworks} onComplete={() => setShowFireworks(false)}/>
            <div className="modal-overlay" onClick={onClose}>
              <div className="modal-content" style={{width:'720px',maxHeight:'85vh'}} onClick={e => e.stopPropagation()}>
                {/* Header */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px',position:'sticky',top:0,backgroundColor:'white',paddingBottom:'16px',borderBottom:'1px solid #e5e7eb',zIndex:10}}>
                  <div>
                    <h3 style={{fontSize:'20px',fontWeight:'600',margin:0}}>
                      {result ? (result.passed ? '🎉 考核通过！' : '📊 答题结果') : (isReview ? '📖 复习模式' : '📝 考核测试')}
                    </h3>
                    <p style={{fontSize:'14px',color:'#6b7280',margin:'4px 0 0'}}>
                      {result ? `得分: ${result.score}/${result.totalPoints} (${result.percentage}分)` : (isReview ? '查看正确答案' : `共 ${questions.length} 题，需全部答对(100分)通过`)}
                    </p>
                  </div>
                  <button onClick={onClose} className="btn-icon" style={{backgroundColor:'#f3f4f6',color:'#6b7280'}}><Icons.X/></button>
                </div>

                {/* Result Summary Card */}
                {result && (
                  <div style={{padding:'20px',marginBottom:'20px',borderRadius:'12px',backgroundColor:result.passed?'#d1fae5':'#fef2f2',textAlign:'center'}}>
                    <div style={{fontSize:'48px',marginBottom:'8px'}}>{result.passed ? '🎊' : '😅'}</div>
                    <div style={{fontSize:'24px',fontWeight:'700',color:result.passed?'#059669':'#dc2626',marginBottom:'4px'}}>
                      {result.passed ? '恭喜，全部答对！' : '还需努力！'}
                    </div>
                    <div style={{fontSize:'14px',color:result.passed?'#047857':'#b91c1c'}}>
                      {result.passed ? '你已完美完成本次考核' : `答对 ${questions.filter(q => questionResults[q.id]?.isCorrect).length}/${questions.length} 题，需要全部答对才能通过`}
                    </div>
                  </div>
                )}

                {/* Questions List */}
                <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
                  {questions.map((q, i) => {
                    const qResult = questionResults[q.id];
                    const showResult = result && qResult;
                    
                    return (
                      <div key={q.id} style={{padding:'16px',backgroundColor:showResult ? (qResult.isCorrect ? '#f0fdf4' : '#fef2f2') : '#f9fafb',borderRadius:'12px',border:showResult ? (qResult.isCorrect ? '2px solid #86efac' : '2px solid #fca5a5') : 'none'}}>
                        {/* Question Header */}
                        <div style={{display:'flex',gap:'8px',marginBottom:'10px',alignItems:'center',flexWrap:'wrap'}}>
                          <span style={{backgroundColor:'#0d9488',color:'white',padding:'3px 10px',borderRadius:'5px',fontSize:'12px',fontWeight:'600'}}>第 {i+1} 题</span>
                          <span style={{backgroundColor:'#dbeafe',color:'#3b82f6',padding:'3px 10px',borderRadius:'5px',fontSize:'12px'}}>{q.question_type === 'single' ? '单选' : '多选'}</span>
                          <span style={{backgroundColor:'#fef3c7',color:'#d97706',padding:'3px 10px',borderRadius:'5px',fontSize:'12px'}}>{q.points}分</span>
                          {showResult && (
                            <span style={{marginLeft:'auto',padding:'3px 10px',borderRadius:'5px',fontSize:'12px',fontWeight:'600',backgroundColor:qResult.isCorrect?'#dcfce7':'#fee2e2',color:qResult.isCorrect?'#16a34a':'#dc2626'}}>
                              {qResult.isCorrect ? '✓ 正确' : '✗ 错误'}
                            </span>
                          )}
                        </div>
                        
                        {/* Question Text */}
                        <div style={{fontSize:'14px',fontWeight:'500',marginBottom:'12px',lineHeight:'1.5'}}>{q.question_text}</div>
                        
                        {/* Options */}
                        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                          {q.options?.map(opt => {
                            const selected = (answers[q.id] || []).includes(opt.id);
                            const isCorrectOption = q.correct_answers?.includes(opt.id);
                            const showCorrectInReview = isReview && isCorrectOption;
                            
                            // After submission styling
                            let optBg = 'white', optBorder = '1px solid #e5e7eb', optColor = '#374151', badgeEl = null;
                            
                            if (showResult) {
                              if (isCorrectOption && selected) {
                                // Correct and selected
                                optBg = '#dcfce7'; optBorder = '2px solid #22c55e'; optColor = '#15803d';
                                badgeEl = <span style={{fontSize:'11px',color:'#16a34a',fontWeight:'600'}}>✓ 正确</span>;
                              } else if (isCorrectOption && !selected) {
                                // Correct but not selected (show correct answer)
                                optBg = '#fef9c3'; optBorder = '2px solid #facc15'; optColor = '#a16207';
                                badgeEl = <span style={{fontSize:'11px',color:'#ca8a04',fontWeight:'600'}}>← 正确答案</span>;
                              } else if (!isCorrectOption && selected) {
                                // Wrong and selected
                                optBg = '#fee2e2'; optBorder = '2px solid #ef4444'; optColor = '#b91c1c';
                                badgeEl = <span style={{fontSize:'11px',color:'#dc2626',fontWeight:'600'}}>✗ 你的选择</span>;
                              }
                            } else if (showCorrectInReview) {
                              optBg = '#d1fae5'; optBorder = '2px solid #10b981'; optColor = '#059669';
                            } else if (selected) {
                              optBg = '#f0fdfa'; optBorder = '2px solid #0d9488'; optColor = '#0d9488';
                            }
                            
                            return (
                              <div key={opt.id} onClick={() => handleSelect(q.id, opt.id, q.question_type === 'multiple')} style={{padding:'10px 14px',borderRadius:'8px',border:optBorder,backgroundColor:optBg,cursor:(isReview || result)?'default':'pointer',display:'flex',alignItems:'center',gap:'10px'}}>
                                <div style={{width:'24px',height:'24px',borderRadius:q.question_type==='single'?'50%':'5px',backgroundColor:(showCorrectInReview || selected || (showResult && isCorrectOption))?'#0d9488':'#f3f4f6',color:(showCorrectInReview || selected || (showResult && isCorrectOption))?'white':'#6b7280',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'600',fontSize:'12px',flexShrink:0}}>{opt.id}</div>
                                <span style={{color:optColor,flex:1,fontSize:'13px'}}>{opt.text}</span>
                                {showCorrectInReview && <span style={{color:'#10b981',fontSize:'12px'}}>✓ 正确答案</span>}
                                {badgeEl}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}

                {/* Footer Buttons */}
                <div style={{position:'sticky',bottom:0,backgroundColor:'white',paddingTop:'16px',borderTop:'1px solid #e5e7eb',marginTop:'20px'}}>

            </div>
          </>

      // ==================== TRAINING TASK ====================
      const TrainingTask = ({ task, isCompleted, onToggleComplete, onEdit, onDelete, canEditTraining, supabase, onRefresh, currentUser, resources }) => {

        const [showMaterials, setShowMaterials] = useState(false);

            setMaterials(mats || []);
            setQuizCount(count || 0);

        const handleToggle = async () => {

            setShowQuizTaking(true);
          } else {
            setLoading(true);
            await onToggleComplete(task.id);

          await onToggleComplete(task.id);
          onRefresh();
        };

        return (
          <>

                {/* Task Title */}

                  <span style={{fontSize:'13px',fontWeight:'500',color:isCompleted?'#059669':'#1f2937'}}>{task.title}</span>

                  {materials.length > 0 && (
                    <span style={{display:'flex',alignItems:'center',gap:'3px',padding:'3px 8px',backgroundColor:'#dbeafe',borderRadius:'5px',fontSize:'11px',color:'#3b82f6',fontWeight:'500'}}>
                      <Icons.Document/> {materials.length} 份资料
                    </span>
                  )}
                  {isQuizTask && quizCount > 0 && (
                    <span style={{display:'flex',alignItems:'center',gap:'3px',padding:'3px 8px',backgroundColor:'#fef3c7',borderRadius:'5px',fontSize:'11px',color:'#d97706',fontWeight:'500'}}>
                      <Icons.Quiz/> {quizCount} 题考核
                    </span>
                  )}
                </div>

                {/* Expand Icon */}
                <Icons.Chevron expanded={isExpanded}/>
              </div>

              {/* Expanded Content */}
              {isExpanded && (
                <div style={{padding:'0 16px 16px',borderTop:'1px solid #f3f4f6'}}>
                  {/* Learning Materials Section */}

                    <div style={{marginTop:'12px'}}>
                      <div style={{fontSize:'12px',color:'#6b7280',marginBottom:'8px'}}>学习资料</div>
                      <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                        {materials.map(m => (
                          <a key={m.id} href={m.external_url} target="_blank" rel="noopener noreferrer" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',backgroundColor:'#f9fafb',borderRadius:'6px',textDecoration:'none',border:'1px solid #e5e7eb'}}>
                            <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                              <div style={{width:'28px',height:'28px',borderRadius:'5px',backgroundColor:'#dbeafe',display:'flex',alignItems:'center',justifyContent:'center',color:'#3b82f6'}}>

                              <span style={{fontSize:'12px',color:'#1f2937'}}>{m.external_title}</span>
                            </div>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                          </a>

                  {/* Admin Actions */}
